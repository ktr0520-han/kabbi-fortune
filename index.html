<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>깨비 운세</title>
  <meta name="theme-color" content="#2b1055" />
  <meta name="description" content="깨비 운세 - 오늘의 운세, 재회운, 궁합 서비스" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="kkabbi.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="symbol">🪄</div>
      <h1>깨비 운세</h1>
      <img class="mascot-img" src="kkabbi.png" alt="깨비 캐릭터" />
      <p class="main-copy">오늘의 문이 열리면 행운도 함께 들어옵니다</p>
      <p class="sub-copy">고급스럽고 신비롭게, 하지만 친근하게 다가오는 오늘의 운세</p>
    </section>

    <section class="card">
      <h2>💞 재회 궁합 입력</h2>
      <div class="input-grid">
        <input id="myBirth" placeholder="내 생년월일 (예: 1990-03-12)" />
        <input id="theirBirth" placeholder="상대 생년월일 (예: 1988-11-07)" />
        <button class="primary" onclick="calcReunion()">궁합 결과 보기</button>
      </div>

      <div class="label">TODAY</div>
      <h2>오늘의 총운</h2>
      <div class="result" id="result"></div>
    </section>

    <button class="wide" onclick="drawFortune()">🔮 오늘의 운세 뽑기</button>

    <section>
      <h3>띠별 운세</h3>
      <div class="grid" id="zodiacGrid"></div>
    </section>

    <section class="grid two">
      <button onclick="drawMoney()">💰 재물운</button>
      <button onclick="drawLove()">❤️ 애정운</button>
      <button onclick="drawReunionLuck()">💞 재회운</button>
      <button onclick="coupleMatch()">💘 커플궁합</button>
    </section>

    <section class="premium">
      <div class="premium-title">👑 프리미엄</div>
      <p class="premium-copy">재회 상세판과 궁합 심층판은 정식 오픈 준비 중입니다.</p>
      <div class="grid two">
        <button onclick="premiumReunion()">🔐 재회 상세판</button>
        <button onclick="premiumMatch()">💎 궁합 심층판</button>
      </div>
    </section>

    <section class="youtube">
      <button onclick="openYoutube()">📺 깨비 운세 TV 연결</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
