<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>깨비 운세</title>
<style>body{margin:0;font-family:sans-serif;background:linear-gradient(180deg,#120022,#220044);color:#fff;display:flex;justify-content:center}.wrap{max-width:420px;padding:20px}.card{border:1px solid rgba(255,215,0,.4);border-radius:24px;padding:20px;background:rgba(255,255,255,.05)}h1{text-align:center;color:#ffd86b}.hero{width:100%;border-radius:20px}.bubble{background:#fff;color:#220044;border-radius:18px;padding:16px;margin-top:12px;text-align:center;font-weight:700}.row{display:flex;gap:10px;margin-top:14px}.row input{flex:1;padding:14px;border-radius:14px;border:none}.row button{padding:14px 18px;border:none;border-radius:14px;background:linear-gradient(90deg,#7a3cff,#ff3ca6);color:#fff;font-weight:700}.menu{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}.menu button{padding:16px;border-radius:16px;background:#2e0d4f;color:#fff;border:1px solid rgba(255,255,255,.15)}</style>
</head>
<body><div class='wrap'><div class='card'><h1>깨비 운세</h1><img class='hero' src='kkabbi.png'><div class='bubble'>무엇이든 물어보세요.<br>깨비가 알려드릴게요!</div><div class='row'><input id='q' placeholder='예: 오늘 연락 올까요?'><button onclick='ask()'>질문하기</button></div><div class='bubble' id='a'>오늘의 운세가 열리고 있어요 ✨</div><div class='menu'><button>오늘의 운세</button><button>재회 궁합</button><button>띠별 운세</button><button>특별 운세</button></div></div></div><script>function ask(){const t=document.getElementById('q').value.trim();document.getElementById('a').innerHTML=t?('🔮 '+t+'<br>좋은 흐름이 보입니다. 침착하게 움직이세요.'): '질문을 입력해 주세요.'}</script></body></html>
