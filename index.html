  {name:'칠성', file:'칠성.jpg', keyword:'기도 · 소원성취 · 간절한 정성',
  meaning:'실제 칠성 부적의 기운이 담긴 카드입니다. 진심으로 빌면 반드시 이루어진다는 강한 메시지를 전합니다. 단순한 바람이 아닌, 온 마음을 다한 간절한 기도가 필요합니다. 칠성님은 진심을 아십니다. 지금 당신이 원하는 것이 있다면 정성껏 빌고 또 비십시오. 소원 성취의 기운이 강하게 흐르고 있습니다. 희생과 정성 없이는 아무것도 얻을 수 없습니다.'},

  {name:'불사', file:'불사.jpg', keyword:'보호 · 인도 · 강한 여성의 기운',

  {name:'용왕', file:'용왕.jpg', keyword:'순환 · 물의 기운 · 수살 주의',

  {name:'도사', file:'도사.jpg', keyword:'수행 · 심신안정 · 고고한 홀로서기',
  meaning:'홀로 산에서 도를 닦는 도사의 기운입니다. 오랜 수행 끝에 결론에 도달하고 심신의 안정을 찾는 시기입니다. 세상의 소란스러움에 휘둘리지 말고 자신의 길을 묵묵히 걸어가십시오. 꿈을 품고 하늘을 나는 학처럼, 높은 뜻을 가슴에 품되 지금은 갈고 닦는 시간임을 잊지 마십시오. 무관심처럼 보이는 고요함이 오히려 가장 강한 힘입니다.'},

  {name:'산신', file:'산신.jpg', keyword:'티끌모아태산 · 결과물 · 막중한 책임',

  {name:'업대감', file:'업대감.jpg', keyword:'재물 · 횡재 · 탐욕 경계',
  meaning:'재물과 재복을 주관하는 업대감신의 강한 기운입니다. 금전운이 크게 열리고 횡재수가 들어오는 시기입니다. 돈이 몰려오는 강한 흐름이 보입니다. 그러나 탐욕은 금물입니다. 움켜쥐려는 마음이 강해질수록 오히려 새어나갈 수 있습니다. 들어오는 복은 감사히 받되, 욕심을 앞세우지 마십시오. 재물은 흐르는 물과 같습니다. 막으면 썩고, 흐르면 더 커집니다.'},

  {name:'대신', file:'대신.jpg', keyword:'신내림 · 이루어짐 · 최고의 성취',

  {name:'선녀', file:'선녀.jpg', keyword:'행복 · 인연 · 도화살 · 만남',

  {name:'동자', file:'동자.jpg', keyword:'귀인 · 천진난만 · 뜻밖의 도움',

  {name:'매일', file:'매일.jpg', keyword:'매일 · 반복 · 꾸준한 지속',

  {name:'신장대', file:'신장대.jpg', keyword:'결심 · 중심잡기 · 강한 뚝심',

  {name:'북두칠성', file:'북두칠성.jpg', keyword:'기도 · 간절한 희생 · 뜻을 이룸',
  meaning:'칠성님께 간절히 기도하는 정성의 카드입니다. 결과를 얻기 위해서는 그에 합당한 희생과 정성이 반드시 필요합니다. 쉽게 얻으려 하지 마십시오. 진심을 다해 빌고, 포기하지 않고 나아가는 자에게만 칠성님이 응답하십니다. 지금 올라가는 사람들처럼, 한 계단 한 계단 올라가는 과정 자체가 당신을 완성시킵니다. 뜻을 이루는 사람은 반드시 그 과정을 감내한 사람입니다.'},

  {name:'합의부', file:'합의부.jpg', keyword:'계약성사 · 결혼 · 찰떡궁합',

  {name:'물병', file:'물병.jpg', keyword:'부족함 · 채움 · 마음의 갈증',
  meaning:'아직 절반밖에 채워지지 않은 물병의 기운입니다. 지금 당신에게는 채워지지 않은 무언가가 있습니다. 물질적인 부족일 수도 있고, 마음의 갈증일 수도 있습니다. 욕심을 앞세우면 절대 채워지지 않습니다. 지금 있는 것에서 출발하여 조금씩 채워나가십시오. 신(神)의 기운이 한 방울씩 떨어지고 있습니다. 서두르지 마십시오. 가득 채워질 때까지 묵묵히 기다리고 노력하는 인내가 필요합니다.'},

  {name:'천칭', file:'천칭.jpg', keyword:'선택 · 저울질 · 경쟁 · 기다림',

  {name:'명부', file:'명부.jpg', keyword:'새출발 · 합격 · 장원급제 · 관운',

  {name:'흑룡', file:'흑룡.jpg', keyword:'고난 속 성취 · 자수성가 · 새로운 탄생',
  meaning:'빗속에서 일어서는 흑룡의 기운입니다. 원하는 것을 성취하기까지 결코 쉽지 않은 과정이 있습니다. 고난과 시련이 따르지만, 그것을 이겨낸 자만이 진정한 용이 됩니다. 개천에서 용이 난다는 말처럼 아무것도 없는 곳에서 스스로 일어서는 자수성가의 기운입니다. 지금의 힘겨움을 탓하지 마십시오. 그 힘겨움이 바로 당신을 강하게 만드는 불꽃입니다. 새롭게 태어나는 시기가 왔습니다.'},

  {name:'성취', file:'성취.jpg', keyword:'최후의 승리 · 정상 · 자만 경계',

  {name:'작두', file:'작두.jpg', keyword:'확실한 결단 · 단칼 정리 · 목숨건 결정',

  {name:'벌전', file:'벌전.jpg', keyword:'실패 · 엎어짐 · 신의 경고',

let sintaroFlipped = false;
let sintaroCurrent = null;

let sintaroQuestion = '';

function sintaroMenu() {
  I('kkabbi-think.png');
  S('🔮 神 신타로카드');
  sintaroFlipped = false;
  sintaroCurrent = null;
  sintaroQuestion = '';
  O(`<div class="sintaro-wrap">
    <div class="sintaro-title">🔮 神 신타로카드</div>
    <div class="sintaro-question-box">
      <input id="sintaroQ" placeholder="질문을 입력하세요  예: 이 사업이 잘 될까요?" 
        style="width:100%;padding:14px;border-radius:14px;border:2px solid rgba(255,216,107,.5);background:#fff;color:#1a0030;font-size:15px;margin-bottom:10px;outline:none;box-sizing:border-box;">
      <button class="sintaro-btn" onclick="sintaroAskDraw()" style="width:100%;padding:14px;font-size:16px;">🎴 질문하고 카드 뽑기</button>
    </div>
  </div>`);
}

function sintaroAskDraw() {
  const q = document.getElementById('sintaroQ');
  if(!q || !q.value.trim()) {
    q.style.border = '2px solid #ff3ca6';
    q.placeholder = '질문을 먼저 입력해 주세요 🙏';
    return;
  }
  sintaroQuestion = q.value.trim();
  sintaroCurrent = SINTARO[Math.floor(Math.random() * SINTARO.length)];
  sintaroFlipped = false;

  O(`<div class="sintaro-wrap">
    <div class="sintaro-title">🔮 神 신타로카드</div>
    <div class="sintaro-q-display">💬 "${sintaroQuestion}"</div>
    <div class="sintaro-card-area" onclick="sintaroFlip()">
      <div class="sintaro-card-inner" id="sintaroInner">
        <div class="sintaro-face sintaro-back">
          <div class="sintaro-back-text">🙏</div>
          <div class="sintaro-back-hint">카드를 터치하여 뽑으세요</div>
        </div>
        <div class="sintaro-face sintaro-front" id="sintaroFront"></div>
      </div>
    </div>
    <div class="sintaro-btn-row" id="sintaroBtnRow">
      <button class="sintaro-btn secondary" onclick="sintaroFlip()">🃏 카드 열기</button>
    </div>
  </div>`);
}

function sintaroFlip() {
  if(sintaroFlipped) return;
  if(!sintaroCurrent) return;

  const front = document.getElementById('sintaroFront');
  const inner = document.getElementById('sintaroInner');
  if(!front || !inner) return;

  front.innerHTML = `<img src="${encodeURIComponent(sintaroCurrent.file)}" alt="${sintaroCurrent.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=padding:20px;color:#240840;font-size:24px>🔮</div>'">`;
  inner.classList.add('flipped');
  sintaroFlipped = true;

  const btnRow = document.getElementById('sintaroBtnRow');
  if(btnRow) btnRow.style.display = 'none';

  setTimeout(async () => {
    const wrap = document.querySelector('.sintaro-wrap');
    if(!wrap) return;
    wrap.innerHTML += `
      <div class="sintaro-name">✨ ${sintaroCurrent.name}</div>
      <div class="sintaro-keyword">${sintaroCurrent.keyword}</div>
      <div class="sintaro-meaning">${sintaroCurrent.meaning}</div>
      <div class="sintaro-ai-box" id="sintaroAI">
        <div class="sintaro-ai-loading">🔮 깨비아씨가 신령님께 여쭤보는 중...</div>
      </div>
      <div class="sintaro-btn-row">
        <button class="sintaro-btn" onclick="sintaroReset()">🔄 다시 뽑기</button>
      </div>`;
    await sintaroAIRead();
  }, 800);
}

async function sintaroAIRead() {
  const aiBox = document.getElementById('sintaroAI');
  if(!aiBox) return;
  try {
    const response = await fetch('/api/sintaro', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        question: sintaroQuestion,
        cardName: sintaroCurrent.name,
        cardKeyword: sintaroCurrent.keyword,
        cardMeaning: sintaroCurrent.meaning
      })
    });
    const data = await response.json();
    const text = data.result || '신령님의 말씀을 전하기 어렵습니다. 다시 시도해주세요.';
    aiBox.innerHTML = `
      <div class="sintaro-ai-title">🌟 깨비아씨의 해석</div>
      <div class="sintaro-ai-text">${text}</div>`;
  } catch(e) {
    aiBox.innerHTML = '';
  }
}

function sintaroReset() {
  sintaroFlipped = false;
  sintaroCurrent = null;
  sintaroQuestion = '';
  sintaroMenu();
}
