<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 띠별 운세</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="today" id="todayText">오늘의 운세</p>
        <h1>오늘의 12띠 운세</h1>
        <p class="subtitle">
          내 띠를 선택하면 총운, 애정운, 금전운, 일·사업운, 조심할 점을 한눈에 볼 수 있습니다.
        </p>
      </div>
    </section>

    <section class="zodiac-grid" id="zodiacGrid"></section>

    <section class="selected-card" id="selectedCard"></section>

    <section class="all-section">
      <div class="section-title">
        <h2>12띠 전체 운세</h2>
        <p>다른 띠 운세도 함께 확인해보세요.</p>
      </div>
      <div class="all-grid" id="allGrid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
