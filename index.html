<!doctype html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1b0033">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="깨비아씨">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>

</head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>깨비아씨 운세 실행본</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at 20% 10%,rgba(255,216,107,.18),transparent 28%),
    radial-gradient(circle at 85% 18%,rgba(255,60,166,.16),transparent 30%),
    linear-gradient(180deg,#120022,#26004a,#090010);
}
.wrap{max-width:430px;margin:auto;min-height:100vh;padding:18px}
.brand{height:38px}
.brand span{color:#ffd86b;font-style:italic;font-weight:900;font-size:28px;display:inline-block;transform:rotate(-12deg);text-shadow:0 0 12px rgba(255,216,107,.5)}
h1{text-align:center;color:#ffd86b;font-size:42px;margin:0 0 12px;text-shadow:0 0 18px rgba(255,216,107,.35)}
.hero{width:100%;border-radius:24px;background:#fff;padding:8px;box-shadow:0 18px 45px rgba(0,0,0,.35)}
.card{background:rgba(255,255,255,.96);color:#240840;border-radius:22px;padding:17px;margin-top:14px;line-height:1.65;font-weight:850;text-align:center;white-space:pre-line}
.row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:12px}
input,select,button{padding:14px;border-radius:16px;font-size:16px}
input,select{border:3px solid #fff;width:100%}
button,.download{
  border:none;
  background:linear-gradient(90deg,#7a3cff,#ff3ca6);
  color:#fff;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
}
.menu{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.menu button{min-height:70px;background:rgba(255,255,255,.08);border:1px solid rgba(255,216,107,.32)}
.talismanGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.talismanCard{background:rgba(122,60,255,.12);border:1px solid rgba(122,60,255,.25);border-radius:18px;padding:12px;text-align:center}
.talismanCard button{width:100%;margin-top:8px;font-size:14px;padding:10px}
.download{padding:13px 18px;border-radius:16px;margin-top:12px}
.footer{margin:18px 0 30px;text-align:center;color:#d8c7ff;font-size:13px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span>╱ 터신전</span></div>
  <h1>깨비아씨 운세</h1>

  <img id="img" class="hero" src="kkabbi.png" alt="깨비아씨 운세">

  <div id="speech" class="card">무엇이든 물어보세요.<br>깨비아씨가 마음을 담아 알려드릴게요 ✨</div>

  <div class="row">
    <input id="q" placeholder="예: 그 사람이 왜 연락이 없을까요?">
    <button onclick="ask()">질문</button>
  </div>

  <div class="row">
    <select id="zodiacSelect">
      <option value="">내 띠 선택</option>
      <option>쥐띠</option><option>소띠</option><option>호랑이띠</option><option>토끼띠</option>
      <option>용띠</option><option>뱀띠</option><option>말띠</option><option>양띠</option>
      <option>원숭이띠</option><option>닭띠</option><option>개띠</option><option>돼지띠</option>
    </select>
    <button onclick="myZodiac()">내 띠</button>
  </div>

  <div id="out" class="card">오늘의 운세를 불러오는 중 ✨</div>

  <div class="menu">
    <button onclick="today()">🌙 오늘의 운세</button>
    <button onclick="allZodiac()">🐭 띠별 운세</button>
    <button onclick="reunion()">💞 재회 궁합</button>
    <button onclick="talismanMenu()">📜 부적</button>
    <button onclick="youtube()">📺 터신전 유튜브 TV</button>
    <button onclick="about()">🔮 神 타로카드 </button>
  </div>

  <div class="footer">
    법인: 터엔터테이먼트<br>
    브랜드: 터신전<br>
    문의: 010-9420-4886<br>
    © 2026 터엔터테이먼트 / 터신전. All rights reserved.
  </div>
</div>

<script>
const O=t=>document.getElementById('out').innerHTML=t;
const I=s=>document.getElementById('img').src=s;
const S=t=>document.getElementById('speech').innerHTML=t;
const pick=a=>a[Math.floor(Math.random()*a.length)];

const daily=["새로운 기회가 열립니다.","막힌 일이 풀립니다.","좋은 소식이 다가옵니다.","사람 속에서 복이 들어옵니다."];
const zodiacNames=["쥐띠","소띠","호랑이띠","토끼띠","용띠","뱀띠","말띠","양띠","원숭이띠","닭띠","개띠","돼지띠"];
const zodiacFortunes=[
"작은 기회가 큰 흐름으로 이어집니다.",
"꾸준함이 복이 되는 날입니다.",
"추진력이 강해지는 하루입니다.",
"관계운이 부드럽게 열립니다.",
"큰 흐름이 당신 쪽으로 움직입니다.",
"지혜로운 선택이 필요한 날입니다.",
"움직일수록 좋은 기회가 생깁니다.",
"마음의 평온이 운을 살립니다.",
"재치와 센스가 빛나는 날입니다.",
"성실함이 좋은 평가로 돌아옵니다.",
"믿음과 진심이 통하는 날입니다.",
"재물운과 즐거운 소식이 따릅니다."
];

const consult={
love:[
"상대가 완전히 멀어진 것보다 먼저 다가가는 부담을 느끼는 흐름이 보여요. 답을 재촉하기보다 가벼운 안부가 더 좋은 반응을 만듭니다.",
"연락의 문제보다 타이밍의 문제에 가깝습니다. 조급함을 내려놓으면 흐름이 다시 움직일 수 있어요."
],
money:[
"큰돈보다 작은 흐름이 먼저 열립니다. 지출을 정리하면 들어오는 복이 커집니다.",
"금전운은 서서히 회복 중입니다. 급한 투자보다 안정적인 선택이 유리합니다."
],
mind:[
"많이 지쳐 있었네요. 지금 필요한 것은 더 버티는 힘이 아니라 잠시 숨을 고를 여유입니다.",
"마음이 흔들리는 건 약해서가 아니라 오래 애써왔기 때문입니다. 오늘은 스스로를 다정하게 대해주세요."
],
general:[
"지금은 속도보다 방향이 중요합니다. 조용히 정리하면 길이 열립니다.",
"작은 신호를 놓치지 마세요. 변화는 늘 조용히 먼저 옵니다."
]
};

function seed(){let d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
function today(){
  I('kkabbi-cute.png');
  S('오늘의 운세를 전해드릴게요 ✨');
  O('🌙 오늘의 운세\n\n총운: '+daily[seed()%daily.length]+'\n사랑운: 따뜻한 대화가 중요합니다.\n금전운: 작은 절약이 복이 됩니다.\n행운 숫자: '+((seed()%9)+1));
}
function allZodiac(){
  I('kkabbi-basic.png');
  S('12띠 운세를 모두 펼쳐볼게요 🐭');
  let txt='🐭 오늘의 12띠 운세\n\n';
  zodiacNames.forEach((z,i)=>{txt+=z+' : '+zodiacFortunes[(seed()+i)%zodiacFortunes.length]+'\n';});
  O(txt);
}
function myZodiac(){
  const z=document.getElementById('zodiacSelect').value;
  if(!z){O('띠를 먼저 선택해 주세요 😊');return;}
  const i=zodiacNames.indexOf(z);
  I('kkabbi-think.png');
  S(z+' 운세를 자세히 살펴볼게요 ✨');
  O('🔮 '+z+' 오늘의 운세\n\n총운: '+zodiacFortunes[(seed()+i)%zodiacFortunes.length]+'\n사랑운: 좋은 인연의 말이 오갈 수 있습니다.\n금전운: 작은 복이 들어오는 흐름입니다.\n건강운: 무리하지 말고 몸을 따뜻하게 하세요.\n행운 숫자: '+(((seed()+i)%9)+1));
}
function reunion(){
  I('kkabbi-love.png');
  S('재회운을 볼게요 💗');
  O('💞 재회 궁합\n\n감정 연결도 87%\n상대 심리: 아직 미련은 있으나 자존심이 큽니다.\n연락 타이밍: 저녁 시간대 짧은 안부\n깨비 조언: 감정적인 장문 메시지는 피하세요.');
}
function talismanMenu(){
  I('kkabbi-talisman.png');
  S('부적 메뉴가 열렸어요 ✨<br>필요한 부적을 골라보세요.');
  O('<div>📜 부적</div><div class="talismanGrid">'+
    '<div class="talismanCard">🎁<br><b>소원성취부적</b><br><small>무료</small><br><button onclick="wish()">보기</button></div>'+
    '<div class="talismanCard">🎓<br><b>합격부적</b><br><small>프리미엄</small><br><button onclick="premiumTalisman()">보기</button></div>'+
    '<div class="talismanCard">🌟<br><b>귀인부</b><br><small>준비중</small><br><button onclick="coming()">보기</button></div>'+
    '<div class="talismanCard">💰<br><b>금전재물부적</b><br><small>준비중</small><br><button onclick="coming()">보기</button></div>'+
    '<div class="talismanCard">💞<br><b>인연부적</b><br><small>준비중</small><br><button onclick="coming()">보기</button></div>'+
    '<div class="talismanCard">💼<br><b>취직부적</b><br><small>준비중</small><br><button onclick="coming()">보기</button></div>'+
    '</div>');
}
function wish(){
  I('wish-talisman-preview.png');
  S('소원성취부적을 무료로 드릴게요 ✨<br>소원을 빌며 지니고 계세요.');
  O('🎁 소원성취부적\n\n소원을 빌며 지니고 있으면 좋은 부적입니다.\n\n<a class="download" href="wish-talisman.png" download="wish-talisman.png">무료 다운로드</a>');
}
function premiumTalisman(){
  I('success-talisman-preview.png');
  S('합격부적은 프리미엄으로 준비 중입니다 👑');
  O('🎓 합격부적\n\n공무원 시험, 취업, 자격증, 승진 시험을 준비하는 분들을 위한 프리미엄 부적입니다.\n\n결제 기능 연결 후 다운로드 가능합니다.');
}
function coming(){
  I('kkabbi-talisman.png');
  S('이 부적은 곧 열릴 예정입니다 ✨');
  O('📜 준비 중인 부적입니다.\n\n설명 페이지와 다운로드 기능을 곧 연결할 예정입니다.');
}
function ask(){
  const q=document.getElementById('q').value.trim();
  if(!q){O('질문을 입력해 주세요 😊');return;}
  let type='general';
  if(q.includes('연락')||q.includes('사랑')||q.includes('재회')) type='love';
  if(q.includes('돈')||q.includes('금전')||q.includes('재물')) type='money';
  if(q.includes('힘들')||q.includes('고민')||q.includes('불안')) type='mind';
  const img={love:'kkabbi-love.png',money:'kkabbi-talisman.png',mind:'kkabbi-cute.png',general:'kkabbi-wink.png'}[type];
  const title={love:'💗 사랑 상담',money:'💰 금전 상담',mind:'🌙 마음 상담',general:'🔮 깨비아씨 상담'}[type];
  I(img);
  S('깨비아씨가 마음을 담아 살펴보았어요 ✨');
  O(title+'\n\n'+pick(consult[type])+'\n\n🍀 깨비 한마디: 급할수록 말은 짧고 마음은 따뜻하게 전해보세요.');
}
function youtube(){
  O('📺 터신전 유튜브\n\n터신전 유튜브 ');
  S('📺 터신전 유튜브 ');
  window.open('https://youtu.be/tSB9tmxs86s','_blank');
}

 function about(){
  I('kkabbi-think.png');
  S('🔮 神 타로카드');
  O('神 타로카드는 우리 전통 신앙과 무속적 상징을 바탕으로 만든 메시지 카드입니다.\n\n운세, 조언, 마음의 방향을 살펴보는 카드로 활용할 수 있습니다.\n\n문의: 010-9420-4886');
}
today();
</script>
</body>


</html>
