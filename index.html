<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>깨비 운세</title>
<meta name="theme-color" content="#2b1055">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;color:#fff;background:linear-gradient(180deg,#10051f,#24104b,#050816)}
.wrap{max-width:430px;margin:auto;min-height:100vh;padding:24px 18px 42px}
.card{background:rgba(255,255,255,.09);border:1px solid rgba(253,230,138,.18);border-radius:26px;padding:18px;margin:14px 0;backdrop-filter:blur(12px)}
.hero{text-align:center}
.hero img{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid #fde047}
h1{margin:0 0 16px;color:#fde047;font-size:38px}
h3{margin:0 0 12px;color:#fde68a}
.menu,.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{border:none;color:#fff;background:linear-gradient(90deg,#7b2ff7,#f107a3);border-radius:18px;padding:16px 12px;font-weight:800;cursor:pointer}
.result{white-space:pre-line;line-height:1.7;background:rgba(0,0,0,.28);border-radius:18px;padding:14px}
.premium{background:linear-gradient(135deg,rgba(250,204,21,.18),rgba(217,70,239,.18))}
.bottom{text-align:center;color:#d8b4fe}
</style>
</head>
<body>
<div class="wrap">
<div class="card hero">
<h1>깨비 운세</h1>
<img src="kkabbi.png" alt="깨비">
<p>오늘의 운세가 궁금하신가요?</p>
</div>

<div class="menu">
<button onclick="todayFortune()">🌙 오늘의 운세</button>
<button onclick="showReunion()">💞 재회 궁합</button>
<button onclick="zodiacFortune()">🐭 띠별 운세</button>
<button onclick="specialFortune()">✨ 특별 운세</button>
</div>

<div class="card" id="actionBox">
<h3>오늘의 한마디</h3>
<div class="result">지금의 작은 노력이 큰 행운으로 돌아옵니다.</div>
</div>

<div class="card premium">
<h3>👑 프리미엄</h3>
<p>재회 상세판과 궁합 심층판은 정식 오픈 준비 중입니다.</p>
<div class="two">
<button onclick="premiumReunion()">🔐 재회 상세판</button>
<button onclick="premiumMatch()">💎 궁합 심층판</button>
</div>
</div>

<div class="card bottom">홈 · 운세 · 궁합 · 마이</div>
</div>

<script>
const result=document.getElementById('actionBox');
const pick=a=>a[Math.floor(Math.random()*a.length)];

function box(title,text){
 result.innerHTML='<h3>'+title+'</h3><div class="result">'+text+'</div>';
}
function todayFortune(){
 box('🌙 오늘의 운세',pick([
 '총운: 기회가 열리는 하루입니다.\n사랑운: 따뜻한 말이 관계를 살립니다.\n금전운: 작은 지출은 신중히 하세요.',
 '총운: 막혔던 일이 풀립니다.\n사랑운: 기다리던 연락운이 밝습니다.\n금전운: 뜻밖의 이익이 따를 수 있습니다.',
 '총운: 새로운 제안이 들어옵니다.\n사랑운: 좋은 흐름입니다.\n금전운: 계산은 꼼꼼히 하세요.'
 ]));
}
function showReunion(){
 box('💞 재회 궁합','생년월일 기반 심층 재회 분석 기능이 연결될 예정입니다.\n현재 버전도 곧 업그레이드됩니다.');
}
function zodiacFortune(){
 box('🐭 띠별 운세','쥐띠: 기회가 옵니다.\n소띠: 꾸준함이 복입니다.\n호랑이띠: 추진력이 강합니다.\n토끼띠: 관계운 상승.');
}
function specialFortune(){
 box('✨ 특별 운세',pick([
 '귀인의 도움이 들어옵니다.',
 '오늘의 선택이 큰 흐름을 바꿉니다.',
 '기다리던 소식이 가까워졌습니다.'
 ]));
}
function premiumReunion(){
 box('🔐 프리미엄 재회 상세판','프리미엄 서비스 준비 중입니다.\n정식 오픈 시 카카오페이 / 토스페이 / 계좌이체 지원 예정입니다.\n\n제공 예정:\n- 상대 심리 상세 분석\n- 연락 타이밍\n- 재회 가능 흐름');
}
function premiumMatch(){
 box('💎 프리미엄 궁합 심층판','프리미엄 서비스 준비 중입니다.\n정식 오픈 시 카카오페이 / 토스페이 / 계좌이체 지원 예정입니다.\n\n제공 예정:\n- 결혼 궁합\n- 갈등 패턴\n- 오래가는 비결');
}
todayFortune();
</script>
</body>
</html>
