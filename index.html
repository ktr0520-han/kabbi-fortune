<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>깨비 운세</title>
<meta name="theme-color" content="#140428">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at 20% 5%,rgba(250,204,21,.18),transparent 28%),
    radial-gradient(circle at 85% 20%,rgba(236,72,153,.18),transparent 30%),
    linear-gradient(180deg,#13051f 0%,#24103f 55%,#080511 100%);
}
.app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  padding:14px 12px 26px;
}
.frame{
  min-height:calc(100vh - 28px);
  border:1px solid rgba(250,204,21,.35);
  border-radius:28px;
  padding:18px 14px;
  background:rgba(255,255,255,.045);
  box-shadow:0 28px 80px rgba(0,0,0,.45), inset 0 0 24px rgba(250,204,21,.04);
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.circleBtn{
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(250,204,21,.35);
  background:rgba(255,255,255,.06);
  font-size:23px;
}
h1{
  text-align:center;
  color:#fde68a;
  margin:10px 0 4px;
  font-size:44px;
  letter-spacing:.04em;
  text-shadow:0 0 24px rgba(250,204,21,.35);
}
.subtitle{
  text-align:center;
  color:#f7d48b;
  font-weight:800;
  margin:0 0 16px;
}
.stage{
  position:relative;
  width:100%;
  max-width:390px;
  margin:0 auto;
}
.characterCard{
  width:100%;
  border-radius:26px;
  overflow:hidden;
  border:2px solid rgba(250,204,21,.55);
  background:rgba(0,0,0,.25);
  box-shadow:0 22px 55px rgba(0,0,0,.35);
}
.characterCard img{
  display:block;
  width:100%;
  height:auto;
}
.arrow{
  position:absolute;
  top:45%;
  transform:translateY(-50%);
  width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(250,204,21,.4);
  background:rgba(255,255,255,.07);
  color:#fde68a;
  font-size:26px;
  display:flex;align-items:center;justify-content:center;
}
.arrow.left{left:-8px}
.arrow.right{right:-8px}
.dots{
  display:flex;
  justify-content:center;
  gap:8px;
  margin:10px 0 16px;
}
.dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(255,255,255,.25);
}
.dot.active{background:#f6c85f}
.speech{
  margin:0 auto 14px;
  max-width:450px;
  background:#fff;
  color:#24104b;
  border-radius:24px;
  padding:20px 18px;
  text-align:center;
  font-size:22px;
  line-height:1.55;
  font-weight:900;
  box-shadow:0 18px 40px rgba(0,0,0,.22);
}
.askPanel{
  border-radius:25px;
  padding:14px;
  background:rgba(16,5,31,.78);
  border:1px solid rgba(217,70,239,.35);
}
.askRow{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
}
input{
  width:100%;
  border:none;
  background:rgba(255,255,255,.10);
  color:#fff;
  border-radius:18px;
  padding:15px;
  font-size:16px;
}
input::placeholder{color:#c4b5fd}
button{
  border:none;
  color:#fff;
  font-weight:900;
  border-radius:18px;
  padding:15px 16px;
  background:linear-gradient(135deg,#8b35ff,#ec0c97);
  box-shadow:0 12px 28px rgba(236,12,151,.22);
  cursor:pointer;
}
.thumbRow{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}
.thumb{
  border-radius:13px;
  overflow:hidden;
  border:1px solid rgba(250,204,21,.35);
  opacity:.82;
  background:#1f1138;
}
.thumb.active{
  opacity:1;
  box-shadow:0 0 0 2px #f6c85f;
}
.thumb img{
  width:100%;
  display:block;
}
.quickNav{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:13px;
  padding-top:12px;
  border-top:1px solid rgba(255,255,255,.10);
  text-align:center;
}
.quickNav div{
  color:#fde68a;
  font-size:12px;
  cursor:pointer;
}
.resultBox{
  margin-top:14px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(250,204,21,.22);
  border-radius:22px;
  padding:16px;
}
.resultBox h3{margin:0 0 10px;color:#fde68a}
.resultText{white-space:pre-line;line-height:1.7;font-size:15px;color:#fff}
@media(max-width:420px){
  h1{font-size:38px}
  .speech{font-size:19px}
  .arrow.left{left:4px}
  .arrow.right{right:4px}
}
</style>
</head>
<body>
<div class="app">
  <div class="frame">
    <div class="topbar">
      <div class="circleBtn">☰</div>
      <div class="circleBtn">🔔</div>
    </div>

    <h1>✤ 깨비 운세 ✤</h1>
    <p class="subtitle">✤ 오늘의 운세가 깨비가 전해드려요! ✤</p>

    <div class="stage">
      <div class="arrow left" onclick="prevKabbi()">‹</div>
      <div class="characterCard">
        <img id="mainKabbi" src="kkabbi-love.png" alt="깨비">
      </div>
      <div class="arrow right" onclick="nextKabbi()">›</div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="speech" id="speechText">
      연락운을 살펴볼게요 💗<br>답은 타이밍에 있어요.
    </div>

    <div class="askPanel">
      <div class="askRow">
        <input id="question" placeholder="질문을 입력해 주세요...">
        <button onclick="askKabbi()">질문하기 →</button>
      </div>

      <div class="thumbRow" id="thumbRow"></div>

      <div class="quickNav">
        <div onclick="premiumReunion()">👑<br>프리미엄</div>
        <div onclick="todayFortune()">🌙<br>운세</div>
        <div onclick="showReunion()">💗<br>궁합</div>
        <div onclick="specialFortune()">⭐<br>특별</div>
      </div>
    </div>

    <div class="resultBox" id="resultBox">
      <h3>오늘의 운세</h3>
      <div class="resultText">오늘은 새로운 제안이나 연락이 들어올 수 있습니다.</div>
    </div>
  </div>
</div>

<script>
const characters=[
  {key:'basic',src:'kkabbi-basic.png',name:'기본 깨비',msg:'안녕하세요! 💗<br>무엇이든 물어보세요.'},
 {key:'wink', src:'kkabbi-wink.png', name:'윙크 깨비 (좋은 소식)', msg:'좋은 소식이 보여요 ✨<br>기대해도 좋아요.'},
  {key:'love',src:'kkabbi-love.png',name:'사랑운 깨비',msg:'연락운을 살펴볼게요 💗<br>답은 타이밍에 있어요.'},
  {key:'talisman',src:'kkabbi-talisman.png',name:'부적 깨비',msg:'좋은 기운을 드릴게요 ✨<br>복이 가까이 있어요.'},
  {key:'think',src:'kkabbi-think.png',name:'진지한 깨비',msg:'천천히 생각해볼까요? 🤔<br>답은 마음 안에 있어요.'},
  {key:'cute',src:'kkabbi-cute.png',name:'귀여운 깨비',msg:'괜찮아요 😊<br>깨비가 곁에 있어요.'}
];
let current=2;

function render(){
  const c=characters[current];
  document.getElementById('mainKabbi').src=c.src;
  document.getElementById('speechText').innerHTML=c.msg;
  document.getElementById('dots').innerHTML=characters.map((_,i)=>'<span class="dot '+(i===current?'active':'')+'"></span>').join('');
  document.getElementById('thumbRow').innerHTML=characters.slice(0,3).map((c,i)=>'<div class="thumb '+(i===current?'active':'')+'" onclick="setCurrent('+i+')"><img src="'+c.src+'" alt="'+c.name+'"></div>').join('');
}
function setCurrent(i){current=i;render();}
function prevKabbi(){current=(current+characters.length-1)%characters.length;render();}
function nextKabbi(){current=(current+1)%characters.length;render();}
function choose(key){
  const i=characters.findIndex(c=>c.key===key);
  if(i>=0){current=i;render();}
}
function result(title,text){
  document.getElementById('resultBox').innerHTML='<h3>'+title+'</h3><div class="resultText">'+text+'</div>';
}
function askKabbi(){
  const q=document.getElementById('question').value.trim();
  if(!q){choose('cute'); result('깨비의 말','질문을 입력해 주세요 😊'); return;}
  if(q.includes('연락')||q.includes('재회')||q.includes('사랑')){
    choose('love');
    result('💗 사랑/재회운','기다리던 소식이 움직일 수 있어요.\n다만 먼저 감정을 쏟기보다 짧고 따뜻하게 다가가세요.');
  }else if(q.includes('돈')||q.includes('금전')||q.includes('복')){
    choose('talisman');
    result('💰 금전운','작은 기회가 복이 됩니다.\n큰 지출은 천천히 결정하고 들어오는 흐름을 놓치지 마세요.');
  }else if(q.includes('고민')||q.includes('힘들')||q.includes('걱정')){
    choose('think');
    result('🤔 깨비 조언','지금은 서두르기보다 흐름을 보는 지혜가 필요합니다.\n마음이 급할수록 한 걸음 쉬어가세요.');
  }else{
    choose('wink');
    result('✨ 깨비 답변','좋은 기운이 곁에 있어요.\n오늘은 작은 신호를 놓치지 않는 것이 중요합니다.');
  }
}
function todayFortune(){
  choose('basic');
  result('🌙 오늘의 운세','🔮 총운: 새로운 제안이나 연락이 들어올 수 있습니다.\n❤️ 사랑운: 기다리던 연락운이 밝아집니다.\n💰 금전운: 계산은 꼼꼼히, 결정은 천천히 하세요.\n🍀 행운 숫자: 9\n✨ 한줄 조언: 작은 기회를 가볍게 넘기지 마세요.');
}
function showReunion(){
  choose('love');
  result('💞 재회 궁합 결과','💞 감정 연결도 87%\n🌙 재회 가능성: 높음\n🧠 상대 심리: 아직 미련은 있으나 자존심이 커서 먼저 다가오지 못하는 흐름입니다.\n📩 연락 타이밍: 5월 초 저녁 시간대\n⚠️ 피해야 할 행동: 감정적인 장문 메시지\n✨ 깨비 조언: 가벼운 안부가 열쇠입니다.');
}
function specialFortune(){
  choose('talisman');
  result('✨ 특별 운세','행운 부적의 기운이 들어옵니다.\n작은 소원이 이루어질 수 있어요.\n오늘은 뜻밖의 도움이 가까이에 있습니다.');
}
function premiumReunion(){
  choose('talisman');
  result('👑 프리미엄 안내','프리미엄 서비스 준비 중입니다.\n정식 오픈 시 카카오페이 / 토스페이 / 계좌이체 지원 예정입니다.\n\n제공 예정:\n- 상대 심리 상세 분석\n- 연락 타이밍\n- 재회 가능 흐름\n- 결혼 궁합');
}
render();
</script>
</body>
</html>
