<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>깨비 운세</title>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:linear-gradient(180deg,#12051f,#24104b,#050816);color:#fff}
.wrap{max-width:430px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:18px;margin:14px 0}
.hero{text-align:center}.hero img{width:100px;height:100px;border-radius:50%;border:3px solid gold}
h1{color:#fde047;margin:0 0 12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{border:none;padding:15px;border-radius:16px;color:#fff;font-weight:800;background:linear-gradient(90deg,#7b2ff7,#f107a3)}
.result{white-space:pre-line;line-height:1.7;background:rgba(0,0,0,.25);padding:14px;border-radius:18px}
.ask{display:flex;gap:8px}.ask input{flex:1;padding:12px;border-radius:14px;border:none}
.kabbiTalk{display:flex;gap:12px;align-items:flex-start}
.kabbiTalk img{width:72px;height:72px;border-radius:50%;border:2px solid gold}
.bubble{background:#fff;color:#222;padding:12px;border-radius:18px;line-height:1.6;flex:1}
</style>
</head>
<body>
<div class="wrap">
<div class="card hero">
<h1>깨비 운세</h1>
<img src="kkabbi.png">
<p>깨비에게 무엇이든 물어보세요</p>
</div>

<div class="card">
<div class="ask">
<input id="question" placeholder="예: 오늘 연락 올까요?">
<button onclick="askKabbi()">질문</button>
</div>
</div>

<div class="card" id="talkBox">
<div class="kabbiTalk">
<img src="kkabbi.png">
<div class="bubble">안녕하세요 😊 저는 깨비예요. 오늘의 고민을 들려주세요.</div>
</div>
</div>

<div class="grid">
<button onclick="todayFortune()">🌙 오늘의 운세</button>
<button onclick="showReunion()">💞 재회 궁합</button>
<button onclick="zodiacFortune()">🐭 띠별 운세</button>
<button onclick="specialFortune()">✨ 특별 운세</button>
</div>

<div class="card" id="actionBox"></div>
</div>

<script>
const action=document.getElementById('actionBox');
function speak(msg){
document.getElementById('talkBox').innerHTML=
'<div class="kabbiTalk"><img src="kkabbi.png"><div class="bubble">'+msg+'</div></div>';
}
function askKabbi(){
const q=document.getElementById('question').value.trim();
if(!q){speak('질문을 입력해 주세요 😊');return;}
if(q.includes('연락')) speak('기다리던 소식이 움직일 수 있어요. 오늘 저녁 흐름을 살펴보세요.');
else if(q.includes('돈')||q.includes('금전')) speak('지출은 줄이고 들어오는 기회는 놓치지 마세요.');
else if(q.includes('사랑')||q.includes('재회')) speak('마음을 급하게 밀어붙이지 말고 따뜻한 한마디가 열쇠예요.');
else if(q.includes('건강')) speak('오늘은 무리하지 말고 몸의 신호를 먼저 살펴보세요.');
else speak('좋은 기운이 곁에 있어요. 조급함보다 흐름을 믿어보세요.');
}
function box(t,m){action.innerHTML='<div class="card"><h3>'+t+'</h3><div class="result">'+m+'</div></div>';}
function todayFortune(){box('🌙 오늘의 운세','오늘은 작은 기회가 크게 이어질 수 있습니다.');speak('오늘의 문은 천천히 열립니다. 서두르지 마세요.');}
function showReunion(){box('💞 재회 궁합','상대도 당신을 한 번쯤 떠올리고 있습니다.');speak('재회는 타이밍이 중요해요. 지금은 부드러운 접근이 좋아요.');}
function zodiacFortune(){box('🐭 띠별 운세','쥐띠부터 돼지띠까지 오늘은 관계운이 좋습니다.');speak('오늘은 사람 속에서 복이 들어오는 날이에요.');}
function specialFortune(){box('✨ 특별 운세','귀인의 도움을 받을 수 있습니다.');speak('당신을 quietly 돕는 사람이 가까이에 있어요.');}
speak('안녕하세요 😊 저는 깨비예요. 오늘의 고민을 들려주세요.');
</script>
</body>
</html>
