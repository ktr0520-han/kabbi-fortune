.wrap{max-width:430px;margin:auto;min-height:100vh;padding:18px}

function type(q){
 if(q.includes('재회')||q.includes('헤어')||q.includes('전남')||q.includes('전여')) return 'reunion';
 if(q.includes('연락')||q.includes('사랑')||q.includes('연애')||q.includes('남자')||q.includes('여자')) return 'love';
