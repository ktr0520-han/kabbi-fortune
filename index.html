<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>깨비 운세</title>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:linear-gradient(180deg,#120022,#26004a);color:#fff;overflow-x:hidden}
body:before,body:after{
content:"";position:fixed;inset:0;pointer-events:none;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.7) 0 2px,transparent 3px),
radial-gradient(circle at 70% 30%,rgba(255,255,255,.5) 0 2px,transparent 3px),
radial-gradient(circle at 40% 80%,rgba(255,255,255,.6) 0 2px,transparent 3px),
radial-gradient(circle at 85% 70%,rgba(255,255,255,.4) 0 2px,transparent 3px);
animation:stars 8s linear infinite;
opacity:.45
}
body:after{animation-duration:13s;opacity:.25}
@keyframes stars{from{transform:translateY(0)}to{transform:translateY(-40px)}}
.wrap{max-width:430px;margin:auto;padding:18px;position:relative}
.brand{position:relative;height:38px;margin-bottom:2px}
.brand span{position:absolute;left:0;top:0;color:#ffd86b;font-style:italic;font-weight:900;font-size:28px;transform:rotate(-12deg);text-shadow:0 0 12px rgba(255,216,107,.5)}
h1{text-align:center;color:#ffd86b;margin:4px 0 14px;font-size:40px;text-shadow:0 0 18px rgba(255,216,107,.35)}
.heroWrap{position:relative}
.hero{
width:100%;border-radius:22px;background:#fff;padding:8px;
box-shadow:0 0 22px rgba(255,216,107,.28);
animation:floaty 3.5s ease-in-out infinite
}
.spark{
position:absolute;width:10px;height:10px;border-radius:50%;
background:#fff;box-shadow:0 0 12px #fff;animation:blink 1.8s infinite
}
.s1{top:10%;left:8%}.s2{top:22%;right:10%;animation-delay:.6s}.s3{bottom:14%;left:14%;animation-delay:1.1s}.s4{bottom:18%;right:16%;animation-delay:1.5s}
@keyframes blink{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.4)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.box{
background:rgba(255,255,255,.96);color:#240840;border-radius:20px;padding:16px;margin-top:14px;
white-space:pre-line;font-weight:700;line-height:1.55;
animation:fadeUp .55s ease
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:12px}
input,button{padding:14px;border-radius:16px;font-size:16px}
button{
border:none;background:linear-gradient(90deg,#7a3cff,#ff3ca6);color:#fff;
box-shadow:0 0 0 rgba(255,60,166,0);
animation:glow 2.2s infinite
}
@keyframes glow{50%{box-shadow:0 0 18px rgba(255,60,166,.45)}}
.menu{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.menu button{min-height:68px;background:rgba(255,255,255,.08);border:1px solid rgba(255,216,107,.3)}
</style>
</head>
<body>
<div class="wrap">
<div class="brand"><span>╱ 터신전</span></div>
<h1>깨비운세</h1>

<div class="heroWrap">
<img id="img" class="hero" src="kkabbi.png">
<div class="spark s1"></div><div class="spark s2"></div><div class="spark s3"></div><div class="spark s4"></div>
</div>

<div id="speech" class="box">터신전의 깨비가 오늘의 운세를 알려드릴게요 ✨</div>
<div class="row"><input id="q" placeholder="예: 오늘 연락 올까요?"><button onclick="ask()">질문하기</button></div>
<div id="out" class="box">오늘의 운세를 불러오는 중 ✨</div>

<div class="menu">
<button onclick="today()">🌙 오늘의 운세</button>
<button onclick="reunion()">💞 재회 궁합</button>
<button onclick="special()">✨ 특별 운세</button>
<button onclick="talisman()">📜 행운 부적</button>
</div>
</div>

<script>
const O=t=>document.getElementById('out').innerHTML=t;
const I=s=>document.getElementById('img').src=s;
const S=t=>document.getElementById('speech').innerHTML=t;
const F=["새로운 기회가 열립니다.","막힌 일이 풀립니다.","좋은 소식이 다가옵니다.","사람 속에서 복이 들어옵니다."];
function seed(){return new Date().getDate()%4}
function today(){I('kkabbi-basic.png');S('오늘의 운세를 전해드릴게요 ✨');O('🌙 오늘의 운세<br><br>'+F[seed()]);}
function reunion(){I('kkabbi-love.png');S('재회운을 볼게요 💗');O('💞 감정 연결도 87%<br><br>짧은 안부가 열쇠입니다.');}
function special(){I('kkabbi-wink.png');S('좋은 기운이 보여요 ✨');O('✨ 기대하지 않던 좋은 일이 생길 수 있어요.');}
function talisman(){I('kkabbi-talisman.png');S('행운 부적을 드릴게요');O('<img src="kkabbi-talisman.png" style="width:140px;border-radius:18px"><br><br><a href="kkabbi-talisman.png" download style="color:#7a3cff">부적 다운로드</a>');}
function ask(){let q=document.getElementById('q').value;if(q.includes('연락')||q.includes('사랑'))reunion();else if(q.includes('돈'))talisman();else special();}
today();
</script>
</body>
</html>
