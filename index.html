<!doctype html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>깨비 운세</title>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:linear-gradient(180deg,#120022,#26004a);color:#fff}
.wrap{max-width:430px;margin:auto;padding:18px}.brand{height:36px}.brand span{color:#ffd86b;font-style:italic;font-weight:900;font-size:28px;display:inline-block;transform:rotate(-12deg)}
h1{text-align:center;color:#ffd86b;margin:0 0 14px}.hero{width:100%;border-radius:22px;background:#fff;padding:8px}
.box{background:#fff;color:#240840;border-radius:20px;padding:16px;margin-top:14px;white-space:pre-line;font-weight:800;line-height:1.6}
.row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:12px}
input,select,button{padding:14px;border-radius:16px;font-size:16px}
button{border:none;background:linear-gradient(90deg,#7a3cff,#ff3ca6);color:#fff;font-weight:900}
.menu{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.menu button{min-height:68px;background:rgba(255,255,255,.08);border:1px solid rgba(255,216,107,.3)}
</style></head><body><div class="wrap">
<div class="brand"><span>╱ 터신전</span></div>
<h1>깨비운세</h1>
<img id="img" class="hero" src="kkabbi.png">
<div id="speech" class="box">터신전의 깨비가 고민도 듣고 띠별 운세도 알려드릴게요 ✨</div>

<div class="row">
<input id="q" placeholder="예: 그 사람에게 연락 올까요?">
<button onclick="ask()">질문하기</button>
</div>

<div class="row">
<select id="z">
<option value="">띠 선택</option>
<option>쥐띠</option><option>소띠</option><option>호랑이띠</option><option>토끼띠</option>
<option>용띠</option><option>뱀띠</option><option>말띠</option><option>양띠</option>
<option>원숭이띠</option><option>닭띠</option><option>개띠</option><option>돼지띠</option>
</select>
<button onclick="myZ()">내 띠 보기</button>
</div>

<div id="out" class="box">오늘의 운세를 불러오는 중 ✨</div>

<div class="menu">
<button onclick="today()">🌙 오늘의 운세</button>
<button onclick="allZ()">🐭 띠별 운세</button>
<button onclick="reunion()">💞 재회 궁합</button>
<button onclick="talisman()">📜 행운 부적</button>
</div>
</div>

<script>
const O=t=>document.getElementById('out').innerHTML=t;
const I=s=>document.getElementById('img').src=s;
const S=t=>document.getElementById('speech').innerHTML=t;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const F=["새로운 기회가 열립니다.","막힌 일이 풀립니다.","좋은 소식이 다가옵니다.","사람 속에서 복이 들어옵니다."];
const Z=["쥐띠","소띠","호랑이띠","토끼띠","용띠","뱀띠","말띠","양띠","원숭이띠","닭띠","개띠","돼지띠"];
function seed(){let d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
function today(){I('kkabbi-basic.png');S('오늘의 운세를 전해드릴게요 ✨');O('🌙 오늘의 운세\n\n총운: '+F[seed()%4]+'\n사랑운: 따뜻한 대화가 중요합니다.\n금전운: 작은 절약이 복이 됩니다.');}
function allZ(){I('kkabbi-think.png');S('12띠 운세를 살펴볼게요 ✨');let t='🐭 12띠 운세\n\n';Z.forEach((z,i)=>t+=z+' : '+F[(seed()+i)%4]+'\n');O(t);}
function myZ(){let z=document.getElementById('z').value;if(!z){O('띠를 먼저 선택해 주세요 😊');return;}I('kkabbi-think.png');S(z+' 운세를 자세히 볼게요 ✨');O('🔮 '+z+'\n\n총운: '+F[seed()%4]+'\n사랑운: 좋은 인연운이 있습니다.\n금전운: 작은 복이 들어옵니다.\n행운 숫자: '+((seed()%9)+1));}
function reunion(){I('kkabbi-love.png');S('재회운을 볼게요 💗');O('💞 재회 궁합\n\n감정 연결도 87%\n짧은 안부가 열쇠입니다.');}
function talisman(){I('kkabbi-talisman.png');S('행운 부적을 드릴게요 ✨');O('<img src="kkabbi-talisman.png" style="width:140px;border-radius:18px"><br><br><a href="kkabbi-talisman.png" download style="color:#7a3cff;font-weight:900">부적 다운로드</a>');}

function ask(){
 let q=document.getElementById('q').value.trim();
 if(!q){O('질문을 입력해 주세요 😊');return;}
 if(q.includes('연락')||q.includes('사랑')||q.includes('재회')){
   reunion(); return;
 }
 if(q.includes('돈')||q.includes('금전')){
   I('kkabbi-talisman.png');S('금전운을 살펴볼게요 ✨');O('💰 금전운\n\n큰 욕심보다 작은 기회를 잡는 날입니다.'); return;
 }
 if(q.includes('힘들')||q.includes('고민')||q.includes('걱정')){
   I('kkabbi-cute.png');S('깨비가 곁에 있어요 🌙');O('🌙 마음 조언\n\n지금은 억지로 버티기보다 잠시 쉬어가는 것이 운을 살립니다.'); return;
 }
 I('kkabbi-wink.png');S('질문의 기운을 보았어요 ✨');O('🔮 깨비 답변\n\n지금은 속도보다 방향이 중요합니다. 차분히 움직이면 길이 열립니다.');
}
today();
</script></body></html>
