<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>깨비 운세</title>
<style>
*{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:linear-gradient(180deg,#12051f,#24104b,#050816);color:#fff}
.wrap{max-width:430px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:18px;margin:14px 0}
.hero{text-align:center}
.hero img,#mainKabbi{width:110px;height:110px;border-radius:50%;border:3px solid gold;object-fit:cover}
h1{margin:0 0 12px;color:#fde047}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{border:none;padding:15px;border-radius:16px;color:#fff;font-weight:800;background:linear-gradient(90deg,#7b2ff7,#f107a3)}
.ask{display:flex;gap:8px}.ask input,input{flex:1;padding:12px;border-radius:14px;border:none}
.kabbiTalk{display:flex;gap:12px;align-items:flex-start}
.kabbiTalk img{width:72px;height:72px;border-radius:50%;border:2px solid gold;object-fit:cover}
.bubble{background:#fff;color:#222;padding:12px;border-radius:18px;line-height:1.6;flex:1}
.result{white-space:pre-line;line-height:1.7;background:rgba(0,0,0,.25);padding:14px;border-radius:18px}
</style>
</head>
<body>
<div class="wrap">
<div class="card hero">
<h1>깨비 운세</h1>
<img id="mainKabbi" src="kkabbi-basic.png">
<p>상황마다 다른 깨비가 등장합니다</p>
</div>

<div class="card">
<div class="ask">
<input id="question" placeholder="예: 오늘 연락 올까요?">
<button onclick="askKabbi()">질문</button>
</div>
</div>

<div class="card" id="talkBox"></div>

<div class="grid">
<button onclick="todayFortune()">🌙 오늘의 운세</button>
<button onclick="showReunion()">💞 재회 궁합</button>
<button onclick="specialFortune()">✨ 특별 운세</button>
<button onclick="adviceMode()">🤔 조언 받기</button>
</div>

<div class="card" id="actionBox"></div>
</div>

<script>
const imgs={
basic:'kkabbi-basic.png',
wink:'kkabbi-wink.png',
love:'kkabbi-love.png',
talisman:'kkabbi-talisman.png',
think:'kkabbi-think.png',
cute:'kkabbi-cute.png'
};
const randomList=[imgs.basic,imgs.wink,imgs.love,imgs.talisman,imgs.think,imgs.cute];

function setKabbi(src){
document.getElementById('mainKabbi').src=src;
}
function speak(msg,src){
setKabbi(src);
document.getElementById('talkBox').innerHTML=
'<div class="kabbiTalk"><img src="'+src+'"><div class="bubble">'+msg+'</div></div>';
}
function box(t,m){
document.getElementById('actionBox').innerHTML='<h3>'+t+'</h3><div class="result">'+m+'</div>';
}
function randImg(){ return randomList[Math.floor(Math.random()*randomList.length)] }

function askKabbi(){
const q=document.getElementById('question').value.trim();
const r=randImg();
if(!q){speak('질문을 입력해 주세요 😊',r);return;}
if(q.includes('연락')) speak('기다리던 소식이 움직일 수 있어요. 오늘 저녁 흐름을 살펴보세요.',imgs.love);
else if(q.includes('돈')) speak('지출은 줄이고 들어오는 기회는 놓치지 마세요.',imgs.wink);
else if(q.includes('건강')) speak('오늘은 무리하지 말고 몸의 신호를 먼저 살펴보세요.',imgs.cute);
else speak('좋은 기운이 곁에 있어요. 조급함보다 흐름을 믿어보세요.',r);
}

function todayFortune(){
box('🌙 오늘의 운세','오늘은 새로운 기회가 열리는 하루입니다.\n행운 숫자: 7\n행운 색상: 보라색');
speak('오늘의 운세를 전해드릴게요. 기회를 놓치지 마세요.',imgs.basic);
}
function showReunion(){
box('💞 재회 궁합','감정 연결도 87%\n상대 심리: 아직 미련은 있으나 자존심이 큼\n연락 타이밍: 5월 초 저녁 시간대\n피해야 할 행동: 감정적인 장문 메시지\n재회 가능성: 높음');
speak('재회운이 강하게 보입니다. 가벼운 안부가 열쇠예요.',imgs.love);
}
function specialFortune(){
box('✨ 특별 운세','행운 부적의 기운이 들어옵니다.\n작은 소원이 이루어질 수 있어요.');
speak('특별운이 열렸어요. 좋은 기운을 받아가세요.',imgs.talisman);
}
function adviceMode(){
box('🤔 깨비 조언','서두르지 말고 지금 해야 할 한 가지에 집중해 보세요.');
speak('생각이 많을수록 답은 멀어져요. 하나씩 정리해볼까요?',imgs.think);
}

todayFortune();
</script>
</body>
</html>
