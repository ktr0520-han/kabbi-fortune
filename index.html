let sintaroFlipped = false;
let sintaroCurrent = null;

function sintaroMenu() {
  I('kkabbi-think.png');
  S('🔮 神 신타로카드');
  sintaroFlipped = false;
  sintaroCurrent = null;
  O(`<div class="sintaro-wrap">
    <div class="sintaro-title">🔮 神 신타로카드</div>
    <div class="sintaro-card-area" onclick="sintaroFlip()">
      <div class="sintaro-card-inner" id="sintaroInner">
        <div class="sintaro-face sintaro-back">
          <div class="sintaro-back-text">🙏</div>
          <div class="sintaro-back-hint">카드를 터치하여 뽑으세요</div>
        </div>
        <div class="sintaro-face sintaro-front" id="sintaroFront"></div>
      </div>
    </div>
    <div class="sintaro-btn-row">
      <button class="sintaro-btn" onclick="sintaroDraw()">🎴 카드 뽑기</button>
      <button class="sintaro-btn secondary" onclick="sintaroReset()">🔄 다시 뽑기</button>
    </div>
  </div>`);
}

function sintaroDraw() {
  sintaroCurrent = SINTARO[Math.floor(Math.random() * SINTARO.length)];
  sintaroFlipped = false;
  const inner = document.getElementById('sintaroInner');
  if(inner) inner.classList.remove('flipped');
  setTimeout(() => sintaroFlip(), 100);
}

function sintaroFlip() {
  if(sintaroFlipped) return;
  if(!sintaroCurrent) {
    sintaroCurrent = SINTARO[Math.floor(Math.random() * SINTARO.length)];
  }
  const front = document.getElementById('sintaroFront');
  const inner = document.getElementById('sintaroInner');
  if(!front || !inner) return;
  front.innerHTML = `<img src="${sintaroCurrent.file}" alt="${sintaroCurrent.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=padding:20px;color:#240840;font-size:24px>🔮</div>'">`;
  inner.classList.add('flipped');
  sintaroFlipped = true;

  setTimeout(() => {
    const wrap = document.querySelector('.sintaro-wrap');
    if(wrap) {
      wrap.innerHTML += `
        <div class="sintaro-name">✨ ${sintaroCurrent.name}</div>
        <div class="sintaro-keyword">${sintaroCurrent.keyword}</div>
        <div class="sintaro-meaning">${sintaroCurrent.meaning}</div>
        <div class="sintaro-btn-row">
          <button class="sintaro-btn" onclick="sintaroReset()">🔄 다시 뽑기</button>
        </div>`;
    }
  }, 800);
}

function sintaroReset() {
  sintaroFlipped = false;
  sintaroCurrent = null;
  sintaroMenu();
}
