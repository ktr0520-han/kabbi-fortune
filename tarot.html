<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>신타로카드 - 깨비아씨</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#1e0040;font-family:sans-serif;color:white;padding:16px 12px 40px;}
    h2{text-align:center;color:gold;font-size:22px;margin-bottom:6px;letter-spacing:2px;}
    .subtitle{text-align:center;color:rgba(255,216,107,0.7);font-size:13px;margin-bottom:14px;}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;max-width:430px;margin:0 auto;}
    .card{height:115px;border-radius:10px;border:2px solid gold;cursor:pointer;overflow:hidden;transition:transform .2s;}
    .card:hover{transform:translateY(-4px);}
    .card.disabled{opacity:0.4;cursor:default;pointer-events:none;}
    .card.selected{border-color:#ff3ca6;box-shadow:0 0 14px rgba(255,60,166,0.7);}
    .card img{width:100%;height:100%;object-fit:cover;display:block;}
    #result{max-width:430px;margin:20px auto 0;padding:20px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,215,0,0.3);border-radius:18px;display:none;}
    .card-img-wrap{text-align:center;margin-bottom:14px;}
    .card-img-wrap img{width:120px;height:170px;object-fit:cover;border-radius:12px;border:2px solid gold;box-shadow:0 0 20px rgba(255,215,0,0.4);}
    .card-title{text-align:center;color:gold;font-size:24px;font-weight:900;margin-bottom:5px;letter-spacing:3px;}
    .card-keyword{text-align:center;color:#ffb3d9;font-size:13px;margin-bottom:14px;font-weight:700;}
    .divider{border:none;border-top:1px solid rgba(255,215,0,0.2);margin:12px 0;}
    .section-title{color:#ffd86b;font-size:13px;font-weight:900;margin:10px 0 4px;}
    .desc{font-size:13.5px;line-height:1.9;color:#f0e6ff;}
    .advice{background:rgba(122,60,255,0.2);border-left:3px solid gold;border-radius:0 10px 10px 0;padding:10px 12px;font-size:13px;line-height:1.8;color:#fff5e0;margin-top:10px;}
    .retry-btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(90deg,#7a3cff,#ff3ca6);color:white;border:none;font-size:15px;font-weight:900;cursor:pointer;margin-top:16px;}
    .back-btn{display:block;text-align:center;margin:10px auto 0;color:rgba(255,216,107,0.7);font-size:13px;cursor:pointer;text-decoration:underline;}
  </style>
</head>
<body>
<h2>🔮 신타로카드</h2>
<div class="subtitle">카드를 한 장 골라 오늘의 메시지를 받아보세요</div>
<div class="grid" id="grid"></div>
<div id="result">
  <div class="card-img-wrap"><img id="rimg" src=""></div>
  <div class="card-title" id="rname"></div>
  <div class="card-keyword" id="rkeyword"></div>
  <hr class="divider">
  <div class="section-title">✨ 오늘의 메시지</div>
  <p class="desc" id="rmsg"></p>
  <hr class="divider">
  <div class="section-title">💗 사랑운</div>
  <p class="desc" id="rlove"></p>
  <div class="section-title">💰 금전운</div>
  <p class="desc" id="rmoney"></p>
  <div class="section-title">💼 직장·학업운</div>
  <p class="desc" id="rwork"></p>
  <hr class="divider">
  <div class="advice" id="radvice"></div>
  <button class="retry-btn" onclick="location.reload()">🔄 다시 뽑기</button>
  <span class="back-btn" onclick="location.reload()">↑ 카드 목록으로</span>
</div>

<script>
var cards=[
  {name:"귀인",img:"귀인.jpg",keyword:"🌟 도움 · 인연 · 협력",msg:"오늘은 당신 곁에 귀인이 나타나는 날입니다. 오래 막혀 있던 일이 뜻밖의 도움으로 풀리기 시작하고, 생각지 못했던 인연이 결정적인 역할을 하게 됩니다. 혼자 모든 것을 해결하려 하지 말고 주변의 손길을 받아들이세요. 귀인은 멀리 있지 않습니다. 가장 가까운 사람에게서 큰 도움이 올 수 있습니다.",love:"좋은 인연이 가까이 있습니다. 소개나 우연한 만남이 특별한 인연으로 이어질 수 있으니 마음을 열어두세요. 연인이 있다면 상대가 당신을 위해 큰 힘이 되어줄 것입니다.",money:"귀인의 도움으로 막혔던 금전 흐름이 풀립니다. 협력이나 공동 작업에서 수익이 생길 수 있습니다.",work:"직장이나 학업에서 도움을 주는 사람이 나타납니다. 혼자 고민하던 문제가 협력을 통해 빠르게 해결됩니다.",advice:"🍀 깨비 한마디: 도움을 받는 것도 능력입니다. 감사하는 마음을 잊지 마세요."},
  {name:"금표",img:"금표.jpg",keyword:"💰 재물 · 풍요 · 기회",msg:"재물운이 활짝 열리는 강한 기운이 느껴집니다. 오랫동안 노력해온 일이 드디어 결실을 맺고, 기대했던 것보다 더 큰 보상이 돌아올 수 있는 날입니다. 돈의 흐름이 당신 쪽으로 향하고 있으니 적극적으로 움직여 보세요.",love:"금전적인 안정감이 연애에도 긍정적인 영향을 미칩니다. 데이트나 선물 등 표현하는 것이 관계를 더욱 깊게 만듭니다.",money:"재물운이 가장 강한 카드 중 하나입니다. 투자, 계약, 거래 등에서 좋은 결과가 기대됩니다. 단, 지나친 욕심은 금물입니다.",work:"성과가 인정받고 보상이 따르는 시기입니다. 승진, 계약 성사, 합격 등의 기쁜 소식이 기대됩니다.",advice:"💛 깨비 한마디: 들어온 복은 나눌 때 더 크게 돌아옵니다."},
  {name:"관재",img:"관재.jpg",keyword:"⚠️ 주의 · 법 · 분쟁",msg:"법적 문제나 공식적인 다툼에 각별한 주의가 필요한 시기입니다. 계약서, 서류, 금전 거래 등에서 허점이 없는지 꼼꼼히 살펴보세요. 크고 작은 시비나 오해가 생길 수 있으니 말과 행동을 신중하게 하는 것이 중요합니다.",love:"감정적인 충돌이나 오해가 생길 수 있는 시기입니다. 차분하게 대화하세요.",money:"금전 관련 분쟁이나 손실에 주의하세요. 큰 금전 거래는 잠시 보류하는 것이 안전합니다.",work:"직장에서 갈등이나 오해가 생길 수 있습니다. 공식 문서 작성 시 실수가 없도록 두 번 확인하세요.",advice:"🛡️ 깨비 한마디: 불필요한 시비에 휘말리지 마세요. 침묵이 최선인 순간도 있습니다."},
  {name:"구설수",img:"구설_수.jpg",keyword:"🗣️ 말조심 · 소문 · 오해",msg:"말과 소문으로 인한 어려움이 생길 수 있는 시기입니다. 내가 하지 않은 말이 와전되거나, 내 의도와 다르게 전달되어 오해가 생길 수 있습니다. 특히 SNS나 단체 대화방에서의 발언에 신중하세요.",love:"연인과의 사이에서 오해가 생길 수 있습니다. 반드시 직접 대화로 확인하세요.",money:"검증되지 않은 정보를 바탕으로 큰 결정을 내리지 마세요.",work:"직장 내 뒷말이나 소문에 휘말릴 수 있습니다. 묵묵히 성과를 쌓으세요.",advice:"🤫 깨비 한마디: 할 말도 때로는 참는 것이 지혜입니다. 말을 아낄수록 운이 쌓입니다."},
  {name:"대감",img:"대감.jpg",keyword:"🏛️ 보호 · 권위 · 안정",msg:"강력한 보호의 기운이 당신을 감싸고 있습니다. 어떠한 어려움이 다가와도 쉽게 흔들리지 않고 든든하게 버텨낼 수 있는 힘이 생깁니다. 권위 있는 사람이나 기관의 도움을 받을 수 있습니다.",love:"든든하고 안정적인 관계가 형성됩니다. 결혼이나 진지한 관계로 발전하기에 좋은 기운입니다.",money:"안정적인 재물운이 따릅니다. 부동산이나 장기적인 투자에 유리한 시기입니다.",work:"직장에서의 위치가 더욱 단단해집니다. 승진이나 중요한 역할 부여가 기대됩니다.",advice:"🏛️ 깨비 한마디: 흔들리지 않는 중심이 당신의 가장 큰 무기입니다."},
  {name:"대신",img:"대신.jpg",keyword:"⚡ 신기 · 강운 · 영적 보호",msg:"신령한 기운이 강하게 내리는 특별한 날입니다. 평소와는 다른 강렬한 직관이나 예감이 느껴질 수 있으며, 그 느낌을 무시하지 마세요. 영적인 보호막이 당신을 둘러싸고 있습니다.",love:"운명적인 인연의 기운이 감돕니다. 강한 끌림을 느끼는 사람이 있다면 그 감정을 신뢰해보세요.",money:"강한 운의 흐름으로 예상치 못한 재물이 들어올 수 있습니다.",work:"영감과 창의력이 최고조에 달합니다. 중요한 시험이나 발표가 있다면 자신감을 갖고 임하세요.",advice:"🌟 깨비 한마디: 오늘 당신에게 스치는 직관을 소중히 하세요. 그것이 신의 메시지입니다."},
  {name:"도사",img:"도사.jpg",keyword:"🧘 지혜 · 통찰 · 성찰",msg:"깊은 지혜와 통찰이 필요한 시기입니다. 겉으로 드러나는 현상보다 본질을 꿰뚫어 보는 눈이 중요합니다. 오랫동안 쌓아온 경험과 내공이 빛을 발하는 때로, 급하게 결론을 내리기보다는 충분히 생각하고 판단하세요.",love:"감정보다 이성적인 판단이 필요한 시기입니다. 깊은 대화가 관계를 한 단계 성숙시킵니다.",money:"충동적인 소비보다 장기적인 관점이 필요합니다. 전문가의 조언을 구하는 것도 좋습니다.",work:"경험에서 나오는 지혜가 빛나는 시기입니다. 깊이 있는 연구와 분석이 좋은 결과를 냅니다.",advice:"🧘 깨비 한마디: 빠른 답보다 깊은 생각이 더 멀리 갑니다."},
  {name:"동자",img:"동자.jpg",keyword:"🌱 순수 · 새 출발 · 희망",msg:"순수하고 맑은 기운이 가득한 날입니다. 과거의 무거운 짐을 내려놓고 새로운 마음으로 시작할 수 있는 좋은 에너지가 넘칩니다. 새로운 도전을 두려워하지 마세요. 첫걸음을 내딛기에 가장 좋은 날입니다.",love:"설레는 첫 감정, 순수한 사랑의 기운이 감돕니다. 초심으로 돌아가면 더 아름다운 감정을 회복할 수 있습니다.",money:"새로운 수입원이나 부업의 씨앗을 심기에 좋은 시기입니다.",work:"새로운 시작, 입학, 취업, 이직 등 출발점에 서 있는 분에게 특히 좋은 카드입니다.",advice:"🌱 깨비 한마디: 처음의 설렘을 잊지 마세요. 그 순수함이 당신의 가장 강한 무기입니다."},
  {name:"떠나가는배",img:"떠나가는배.jpg",keyword:"🚢 이별 · 변화 · 새로운 항해",msg:"무언가 또는 누군가와 이별하거나 멀어지는 흐름이 느껴집니다. 하지만 떠나가는 배는 새로운 항구를 향해 가는 것이기도 합니다. 보내야 할 것은 아름답게 보내주세요.",love:"이별이나 거리감이 생길 수 있는 시기입니다. 때로는 보내주는 것이 더 깊은 사랑입니다.",money:"현재의 수입원이나 사업 방향이 변화할 수 있습니다. 새로운 방향을 모색할 준비를 하세요.",work:"이직이나 부서 변경, 현재 하던 일에서 마무리가 필요한 시기입니다.",advice:"🚢 깨비 한마디: 떠나보내는 것도 용기입니다. 빈자리에 더 좋은 것이 채워질 거예요."},
  {name:"매일",img:"매일.jpg",keyword:"📅 일상 · 꾸준함 · 성실",msg:"특별한 사건보다 매일의 작은 노력이 중요한 시기입니다. 화려한 변화보다 꾸준한 일상 속에서 진짜 복이 쌓입니다. 조급함을 내려놓고 오늘 하루를 성실하게 살아가세요.",love:"화려한 이벤트보다 매일의 작은 관심이 관계를 더 깊게 만듭니다.",money:"큰 횡재보다 꾸준한 저축과 절약이 재물을 쌓습니다.",work:"화려한 성과보다 매일의 성실함이 인정받는 시기입니다.",advice:"📅 깨비 한마디: 매일을 특별하게 살면 인생이 특별해집니다."},
  {name:"명부",img:"명부.jpg",keyword:"📋 결산 · 업보 · 인과응보",msg:"지금까지 행한 일들에 대한 결과가 돌아오는 시기입니다. 좋은 일을 해왔다면 좋은 결과가, 나쁜 일을 해왔다면 그에 따른 책임이 따릅니다. 정직함이 가장 좋은 처방입니다.",love:"과거의 행동이 현재 관계에 영향을 미칩니다. 상대에게 상처를 준 일이 있다면 진심으로 사과할 용기를 내세요.",money:"빌린 돈, 약속한 금액 등 금전적 의무를 반드시 이행하세요.",work:"업무에서의 책임을 회피하면 더 큰 문제가 됩니다. 실수가 있었다면 솔직하게 인정하고 해결하세요.",advice:"📋 깨비 한마디: 뿌린 대로 거둡니다. 지금 심는 씨앗이 미래의 열매가 됩니다."},
  {name:"물병",img:"물병.jpg",keyword:"💧 정화 · 치유 · 새로운 시작",msg:"깨끗한 물처럼 마음과 환경을 정화하는 시기입니다. 오래된 상처나 부정적인 감정을 흘려보내고 새롭게 시작할 준비를 하세요. 주변을 깨끗이 정리하면 좋은 기운이 들어옵니다.",love:"과거의 상처를 치유하고 새로운 마음으로 사랑을 받아들일 준비를 하세요.",money:"지출을 정리하고 새로운 재정 계획을 세우기에 좋은 시기입니다.",work:"업무 환경을 정리하고 새로운 방식으로 접근해보세요.",advice:"💧 깨비 한마디: 물처럼 유연하게, 물처럼 깨끗하게. 흘려보낼 줄 아는 것이 지혜입니다."},

// 뒷면 카드 12장 렌더링
var grid = document.getElementById("grid");
var picked = false;

for(var i=0;i<12;i++){
  var el = document.createElement("div");
  el.className = "card";
  var img = document.createElement("img");
  img.src = "card-back.jpg";
  el.appendChild(img);
  el.onclick = (function(cardEl){
    return function(){
      if(picked) return;
      picked = true;
      // 선택된 카드 표시
      cardEl.classList.add("selected");
      // 나머지 카드 비활성화
      document.querySelectorAll(".card").forEach(function(c){
        if(c !== cardEl) c.classList.add("disabled");
      });
      // 56장 중 랜덤 결과
      var result = cards[Math.floor(Math.random() * cards.length)];
      document.getElementById("rimg").src = result.img;
      document.getElementById("rname").textContent = result.name;
      document.getElementById("rkeyword").textContent = result.keyword;
      document.getElementById("rmsg").textContent = result.msg;
      document.getElementById("rlove").textContent = result.love;
      document.getElementById("rmoney").textContent = result.money;
      document.getElementById("rwork").textContent = result.work;
      document.getElementById("radvice").textContent = result.advice;
      document.getElementById("result").style.display = "block";
      document.getElementById("result").scrollIntoView({behavior:"smooth"});
    };
  })(el);
  grid.appendChild(el);
}
</script>
