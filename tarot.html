<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>신타로카드</title>
  <style>
    body{background:#1e0040;font-family:sans-serif;color:white;margin:0;padding:20px;}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:430px;margin:0 auto;}
    .card{height:120px;background:linear-gradient(145deg,#cc1077,#ff69b4);border-radius:10px;border:2px solid gold;cursor:pointer;overflow:hidden;}
    .card:hover{transform:translateY(-4px);}
    #result{max-width:430px;margin:20px auto;padding:20px;background:rgba(255,255,255,0.1);border-radius:14px;display:none;}
  </style>
</head>
<body>
<h2 style="text-align:center;color:gold;">🔮 신타로카드</h2>
<div class="grid" id="grid"></div>
<div id="result">
  <img id="rimg" style="width:100px;height:150px;object-fit:cover;border-radius:10px;display:block;margin:0 auto 10px;">
  <h3 id="rname" style="text-align:center;color:gold;"></h3>
  <p id="rmsg" style="font-size:13px;line-height:1.8;"></p>
  <button onclick="location.reload()" style="width:100%;padding:12px;border-radius:10px;background:purple;color:white;border:none;font-size:14px;cursor:pointer;margin-top:10px;">다시 뽑기</button>
</div>
<script>
var cards=[
  {name:"귀인",img:"귀인.jpg",msg:"귀인이 나타나 당신을 도와줄 것입니다!"},
  {name:"금표",img:"금표.jpg",msg:"재물운이 밝게 열리고 있습니다!"},
  {name:"관재",img:"관재.jpg",msg:"법적 문제에 주의가 필요합니다!"},
  {name:"구설수",img:"구설 수.jpg",msg:"말과 행동에 주의하세요!"},
  {name:"대감",img:"대감.jpg",msg:"강한 보호막이 함께합니다!"},
  {name:"대신",img:"대신.jpg",msg:"신의 강한 기운이 함께합니다!"},
  {name:"도사",img:"도사.jpg",msg:"지혜와 통찰이 필요한 시기!"},
  {name:"동자",img:"동자.jpg",msg:"순수한 마음으로 새 출발!"},
  {name:"성취",img:"성취.jpg",msg:"드디어 때가 왔습니다!"},
  {name:"장군",img:"장군.jpg",msg:"용기있게 결단하면 승리!"},
  {name:"칠성",img:"칠성.jpg",msg:"칠성의 행운이 함께합니다!"},
  {name:"흑룡",img:"흑룡.jpg",msg:"흑룡의 강한 기운이 함께!"}
];

var grid=document.getElementById("grid");
cards.sort(function(){return Math.random()-0.5;});

cards.forEach(function(card,i){
  var el=document.createElement("div");
  el.className="card";
  el.style.padding="0";
  el.style.overflow="hidden";
  var img=document.createElement("img");
  img.src="card-back.jpg";
  img.style.cssText="width:100%;height:100%;object-fit:cover;display:block;";
  el.appendChild(img);
  el.onclick=function(){
    document.getElementById("rimg").src=card.img;
    document.getElementById("rname").textContent=card.name;
    document.getElementById("rmsg").textContent=card.msg;
    document.getElementById("result").style.display="block";
    document.getElementById("result").scrollIntoView({behavior:"smooth"});
  };
  grid.appendChild(el);
});
</script>
</body>
</html>
