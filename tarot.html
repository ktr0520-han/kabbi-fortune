<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>신타로카드 - 깨비아씨</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Noto Sans KR',sans-serif;color:#fff5e0;min-height:100vh;background:radial-gradient(ellipse 120% 50% at 50% 0%,rgba(100,30,200,0.9) 0%,transparent 55%),linear-gradient(180deg,#1e0040 0%,#140030 20%,#0c001e 45%,#060012 70%,#02000a 100%);}
    .app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:110px;}
    .header{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid rgba(212,168,64,0.2);}
    .back-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(212,168,64,0.4);background:rgba(20,0,45,0.6);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;}
    .header-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:900;background:linear-gradient(160deg,#ffe8a0,#f0c84a,#c89830);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .char-banner{display:flex;align-items:center;gap:14px;padding:16px 18px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(212,168,64,0.15);}
    .char-banner img{width:70px;height:70px;object-fit:cover;border-radius:12px;border:1.5px solid rgba(212,168,64,0.4);}
    .char-banner-text strong{display:block;font-size:15px;font-weight:900;color:#f0c84a;margin-bottom:4px;}
    .char-banner-text span{font-size:12px;color:rgba(195,165,235,0.85);line-height:1.5;}
    .guide{text-align:center;padding:20px 18px 10px;}
    .guide-title{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:900;color:#f0c84a;margin-bottom:8px;}
    .guide-sub{font-size:12.5px;color:rgba(195,165,235,0.8);line-height:1.6;}
    .card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px 14px;}
    .card-item{aspect-ratio:2/3;max-height:120px;border-radius:10px;cursor:pointer;position:relative;transition:transform .2s;}
    .card-item:hover{transform:translateY(-4px);}
    .card-item.picked{transform:translateY(-8px);pointer-events:none;}
    .card-back{position:absolute;inset:0;border-radius:10px;overflow:hidden;border:1.5px solid rgba(212,168,64,0.5);background:linear-gradient(145deg,#cc1077,#ff69b4);display:flex;align-items:center;justify-content:center;}
    .card-back img{width:100%;height:100%;object-fit:contain;display:block;}
    .result-section{display:none;padding:0 16px;}
    .result-section.show{display:block;animation:fadeUp .5s ease;}
    .result-card-display{background:linear-gradient(145deg,#2a0058,#1a0040);border:2px solid rgba(212,168,64,0.55);border-radius:18px;padding:20px;text-align:center;position:relative;overflow:hidden;margin-bottom:14px;}
    .result-card-display::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#d4a840,transparent)}
    .result-card-img{width:120px;height:180px;margin:0 auto 14px;border-radius:12px;border:2px solid rgba(212,168,64,0.6);box-shadow:0 8px 30px rgba(100,20,200,0.5);overflow:hidden;}
    .result-card-img img{width:100%;height:100%;object-fit:cover;display:block;}
    .result-card-name{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:900;color:#f0c84a;margin-bottom:6px;}
    .result-card-keyword{font-size:12px;color:rgba(195,165,235,0.85);margin-bottom:14px;letter-spacing:1px;}
    .result-card-msg{font-size:13.5px;line-height:1.85;color:#fff5e0;text-align:left;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;}
    .redraw-btn{width:100%;padding:13px;border-radius:14px;font-size:14px;font-weight:900;border:1.5px solid rgba(212,168,64,0.4);background:rgba(14,3,32,0.9);color:#f0c84a;cursor:pointer;margin-bottom:14px;transition:all .2s;}
    .redraw-btn:hover{background:rgba(80,20,160,0.5);border-color:#f0c84a;}
    .ask-section{margin-bottom:14px;}
    .ask-label{font-size:12.5px;color:rgba(195,165,235,0.85);font-weight:700;margin-bottom:8px;}
    .ask-row{display:grid;grid-template-columns:1fr auto;gap:8px;}
    .inp{padding:13px 14px;border-radius:14px;font-size:14px;border:1.5px solid rgba(212,168,64,0.3);background:rgba(18,3,38,0.85);color:#fff5e0;outline:none;font-family:'Noto Sans KR',sans-serif;}
    .inp::placeholder{color:rgba(180,150,220,0.5)}
    .inp:focus{border-color:#f0c84a;}
    .ask-btn{padding:13px 16px;border-radius:14px;font-size:14px;font-weight:900;border:none;cursor:pointer;background:linear-gradient(135deg,#6030c0,#c03080);color:#fff;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
    .ask-result{background:rgba(14,3,32,0.92);border:1.5px solid rgba(212,168,64,0.35);border-radius:14px;padding:14px;font-size:13.5px;line-height:1.85;color:#fff5e0;display:none;}
    .ask-result.show{display:block;animation:fadeUp .35s ease;}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;background:rgba(6,0,16,0.97);border-top:1.5px solid rgba(212,168,64,0.35);display:flex;justify-content:space-around;align-items:center;padding:14px 0 24px;backdrop-filter:blur(20px);}
    .nitem{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;padding:2px 0;}
    .nicon{font-size:30px;display:block;}
    .nlabel{font-size:13px;font-weight:700;color:rgba(195,165,235,0.8);}
    .nitem.active .nlabel{color:#f0c84a;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="back-btn" onclick="go('index.html')">←</div>
    <div class="header-title">🔮 신타로카드</div>
  </div>
  <div class="char-banner">
    <img src="kkabbi-think.png" alt="깨비아씨">
    <div class="char-banner-text">
      <strong>진지한 깨비아씨의 신타로</strong>
      <span>마음을 고요히 하고<br>끌리는 카드를 하나 선택하세요!</span>
    </div>
  </div>
  <div class="guide" id="guide">
    <div class="guide-title">✨ 카드를 뽑아보세요</div>
    <div class="guide-sub">마음을 비우고 끌리는 카드를 하나 선택하세요.<br>깨비아씨가 당신의 운명을 읽어드립니다.</div>
  </div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="result-section" id="resultSection">
    <div class="result-card-display">
      <div class="result-card-img" id="cardImg"></div>
      <div class="result-card-name" id="cardName"></div>
      <div class="result-card-keyword" id="cardKeyword"></div>
      <div class="result-card-msg" id="cardMsg"></div>
    </div>
    <button class="redraw-btn" onclick="location.reload()">🔮 다시 카드 뽑기</button>
    <div class="ask-section">
      <div class="ask-label">💬 카드에 대해 질문하기</div>
      <div class="ask-row">
        <input id="q" class="inp" placeholder="예: 이 카드가 사랑에 대해 뭘 말하나요?">
        <button class="ask-btn" onclick="ask()">질문</button>
      </div>
    </div>
    <div class="ask-result" id="askResult"></div>
  </div>
  <div class="bottom-nav">
    <div class="nitem" onclick="go('index.html')"><span class="nicon">🏠</span><span class="nlabel">홈</span></div>
    <div class="nitem" onclick="go('today.html')"><span class="nicon"><img src="nav-zodiac.png" style="width:30px;height:30px;object-fit:contain;" onerror="this.outerHTML='🔮'"></span><span class="nlabel">운세</span></div>
    <div class="nitem" onclick="go('reunion.html')"><span class="nicon">💗</span><span class="nlabel">궁합</span></div>
    <div class="nitem" onclick="go('talisman.html')"><span class="nicon">📜</span><span class="nlabel">카테고리</span></div>
    <div class="nitem active"><span class="nicon">👤</span><span class="nlabel">마이페이지</span></div>
  </div>
</div>
<script>
function go(p){window.location.href=p;}

var cards=[
  {name:"귀인",img:"귀인.jpg",keyword:"도움 · 인연 · 축복",msg:"지금 당신 곁에 귀인이 있습니다. 놓치지 마세요. 이 인연이 당신의 인생을 바꿀 수 있습니다. 먼저 손을 내밀 용기가 필요합니다. 💫 하늘이 보낸 사람을 알아볼 때, 복은 이미 시작됩니다."},
  {name:"금표",img:"금표.jpg",keyword:"재물 · 성공 · 풍요",msg:"돈이 들어오는 흐름이 열렸습니다. 지금 망설이면 이 기회는 사라집니다. 작은 것도 소중히 다루세요. 재물은 씀씀이를 보고 찾아옵니다. 💫 풍요는 감사할 줄 아는 자에게만 머뭅니다."},
  {name:"관재",img:"관재.jpg",keyword:"주의 · 법 · 분쟁",msg:"경고입니다. 지금 당신 주변에 분쟁의 씨앗이 있습니다. 말 한마디, 서류 한 장을 함부로 다루지 마세요. 먼저 양보하는 것이 더 크게 이기는 길입니다. 💫 현명한 자는 싸우지 않고 이깁니다."},
  {name:"구설수",img:"구설 수.jpg",keyword:"말조심 · 소문 · 주의",msg:"지금 당신에 대한 말이 돌고 있습니다. 해명하려 할수록 더 커집니다. 침묵이 최선의 방패입니다. 행동으로만 증명하세요. 💫 진실은 시간이 지나면 반드시 밝혀집니다."},
  {name:"대감",img:"대감.jpg",keyword:"권위 · 보호 · 안정",msg:"강한 존재가 당신을 지켜보고 있습니다. 두려워하지 마세요. 바르게 살아온 당신에게 보호의 기운이 함께합니다. 지금이 중요한 결정을 내려야 할 때입니다. 💫 하늘은 올바른 자를 결코 버리지 않습니다."},
  {name:"대신",img:"대신.jpg",keyword:"신성 · 영험 · 수호",msg:"신의 강한 기운이 지금 당신과 함께합니다. 이 순간을 놓치지 마세요. 진심으로 원하는 것을 기도하세요. 반드시 응답이 옵니다. 💫 간절한 마음은 하늘을 움직입니다."},
  {name:"도사",img:"도사.jpg",keyword:"지혜 · 통찰 · 수련",msg:"겉으로 보이는 것을 믿지 마세요. 지금 상황에는 숨겨진 진실이 있습니다. 서두르지 말고 깊이 살피세요. 당신의 직관이 가장 정확한 나침반입니다. 💫 진정한 지혜는 멈출 줄 아는 것에서 시작됩니다."},
  {name:"동자",img:"동자.jpg",keyword:"순수 · 시작 · 새출발",msg:"새로운 시작이 당신 앞에 있습니다. 두려움을 내려놓으세요. 처음 시작하는 마음으로 도전하면 반드시 길이 열립니다. 순수한 열정이 당신의 가장 강한 무기입니다. 💫 시작하는 자만이 도달할 수 있습니다."},
  {name:"떠나가는배",img:"떠나가는배.jpg",keyword:"이별 · 변화 · 새여정",msg:"지금 손에 꽉 쥐고 있는 것을 놓아야 합니다. 떠나는 것을 붙잡으려 할수록 더 큰 것을 잃습니다. 비워야 새것이 들어옵니다. 이별은 끝이 아니라 더 나은 시작입니다. 💫 잡을 수 없는 것을 놓을 때 자유가 옵니다."},
  {name:"매일",img:"매일.jpg",keyword:"일상 · 꾸준함 · 성실",msg:"화려한 한 방은 없습니다. 하지만 오늘 하루를 성실히 쌓는 당신에게 반드시 큰 결실이 옵니다. 지루해도 멈추지 마세요. 꾸준함이 재능을 이깁니다. 💫 위대함은 매일의 작은 선택에서 만들어집니다."},
  {name:"명부",img:"명부.jpg",keyword:"운명 · 인과 · 업보",msg:"지금 일어나는 일은 우연이 아닙니다. 과거의 선택이 현재를 만들었고, 지금의 선택이 미래를 만듭니다. 원망하지 마세요. 지금부터 좋은 씨앗을 심으면 됩니다. 💫 운명은 바꿀 수 있습니다. 지금 이 순간부터."},
  {name:"물병",img:"물병.jpg",keyword:"정화 · 흐름 · 치유",msg:"당신 안에 쌓인 것들을 비워야 할 때입니다. 오래된 상처, 억울함, 집착을 흘려보내세요. 비운 자리에 새로운 복이 들어옵니다. 💫 맑은 물처럼 흐를 때 당신은 가장 강해집니다."},
  {name:"벌전",img:"벌전.jpg",keyword:"경고 · 주의 · 반성",msg:"지금 당신이 가는 방향에 문제가 있습니다. 멈추고 돌아보세요. 인정하기 어려워도 잘못된 것은 바로잡아야 합니다. 지금 고치지 않으면 나중엔 더 큰 대가를 치릅니다. 💫 용기 있는 반성이 더 나은 미래를 만듭니다."},
  {name:"북망산천",img:"북망산천.jpg",keyword:"조상 · 근원 · 뿌리",msg:"조상의 강한 기운이 지금 당신을 감싸고 있습니다. 잊고 있었던 뿌리를 돌아보세요. 감사와 예를 갖추면 막혔던 운이 뚫립니다. 💫 뿌리가 깊은 나무는 어떤 폭풍도 이겨냅니다."},
  {name:"불사",img:"불사.jpg",keyword:"영생 · 불굴 · 강인함",msg:"지금 당신은 끝났다고 생각하고 있습니까? 아직 끝나지 않았습니다. 당신 안에 꺼지지 않는 불꽃이 있습니다. 다시 일어서세요. 포기하지 않는 자는 절대 패배하지 않습니다. 💫 진정한 강인함은 다시 일어서는 것입니다."},
  {name:"산신",img:"산신.jpg",keyword:"자연 · 보호 · 기도",msg:"산신의 강력한 보호기운이 당신과 함께합니다. 지금 어떤 어려움도 당신을 쓰러뜨릴 수 없습니다. 자연 앞에 겸손하게 기도하면 더 큰 힘이 옵니다. 💫 하늘과 땅이 당신 편입니다."},
  {name:"삼사자",img:"삼사자.jpg",keyword:"심판 · 정의 · 균형",msg:"공정한 심판의 시간이 왔습니다. 억울하게 참아온 것이 있다면 이제 밝혀질 것입니다. 당신이 옳다면 두려워하지 마세요. 진실은 반드시 이깁니다. 💫 하늘 아래 감춰진 것은 없습니다."},
  {name:"상문",img:"상문.jpg",keyword:"슬픔 · 이별 · 위로",msg:"지금 당신의 마음이 많이 무겁군요. 괜찮습니다. 충분히 아파도 됩니다. 하지만 이 시간도 반드시 지나갑니다. 슬픔이 깊을수록 그 뒤에 오는 기쁨도 큽니다. 💫 가장 어두운 밤 뒤에 가장 밝은 새벽이 옵니다."},
  {name:"선녀",img:"선녀.jpg",keyword:"아름다움 · 은혜 · 축복",msg:"하늘의 특별한 은혜가 지금 당신에게 내려오고 있습니다. 당신은 선택받은 존재입니다. 이 은혜를 혼자 품지 말고 주변과 나누세요. 나눌수록 복은 더 커집니다. 💫 은혜는 나눌 때 배가 됩니다."},
  {name:"성취",img:"성취.jpg",keyword:"달성 · 완성 · 성공",msg:"드디어 때가 왔습니다! 지금까지 참고 견뎌온 모든 노력이 결실을 맺을 순간입니다. 마지막까지 포기하지 마세요. 단 한 걸음만 더 나아가면 됩니다. 💫 당신의 꿈은 이미 이루어지고 있습니다."},
  {name:"성황당",img:"성황당.jpg",keyword:"마을 · 공동체 · 수호",msg:"혼자서는 안 됩니다. 지금 당신에게는 함께할 사람이 필요합니다. 주변을 돌아보고 손을 내미세요. 진심으로 나누면 열 배의 힘이 생깁니다. 💫 혼자 빨리 가는 것보다 함께 멀리 가는 것이 낫습니다."},
  {name:"신장",img:"신장.jpg",keyword:"수호 · 힘 · 결단",msg:"더 이상 망설일 시간이 없습니다. 지금 결단해야 합니다. 신장의 강한 기운이 당신을 지키고 있습니다. 두려움을 버리고 앞으로 나아가세요. 💫 결단하는 자에게만 길이 열립니다."},
  {name:"신장대",img:"신장대.jpg",keyword:"권능 · 위엄 · 강함",msg:"당신 안에 엄청난 잠재력이 있습니다. 스스로를 과소평가하지 마세요. 하늘이 부여한 당신의 능력을 믿으세요. 지금 당신이 생각하는 것보다 훨씬 더 강합니다. 💫 진정한 강함은 자신을 믿는 것에서 시작됩니다."},
  {name:"업대감",img:"업대감.jpg",keyword:"업 · 카르마 · 인과",msg:"지금 겪고 있는 일은 과거에서 온 것입니다. 하지만 지금부터의 선택이 미래를 바꿉니다. 선한 마음으로 행동하면 반드시 좋은 업이 쌓입니다. 💫 지금 심는 씨앗이 당신의 미래입니다."},

var grid=document.getElementById("cardGrid");
var indices=[];
for(var i=0;i<cards.length;i++)indices.push(i);
indices.sort(function(){return Math.random()-0.5;});

var show=indices.slice(0,12);
for(var p=0;p<show.length;p++){
  (function(idx){
    var el=document.createElement("div");
    el.className="card-item";
    var inner=document.createElement("div");
    inner.className="card-back";
    el.appendChild(inner);
    el.onclick=function(){selectCard(idx,el);}
    grid.appendChild(el);
  })(show[p]);
}

function selectCard(idx,el){
  var all=document.querySelectorAll(".card-item");
  for(var i=0;i<all.length;i++){
    all[i].style.opacity="0.3";
    all[i].style.pointerEvents="none";
  }
  el.style.opacity="1";
  el.classList.add("picked");
  setTimeout(function(){showResult(cards[idx]);},600);
}

function showResult(card){
  document.getElementById("guide").style.display="none";
  var imgDiv=document.getElementById("cardImg");
  imgDiv.innerHTML="<img src=\""+card.img+"\" alt=\""+card.name+"\">";
  document.getElementById("cardName").textContent=card.name;
  document.getElementById("cardKeyword").textContent=card.keyword;
  document.getElementById("cardMsg").textContent=card.msg;
  var section=document.getElementById("resultSection");
  section.classList.add("show");
  section.scrollIntoView({behavior:"smooth",block:"start"});
}

function ask(){
  var q=document.getElementById("q").value.trim();
  if(!q)return;
  var answers=[
    "카드가 말합니다: 지금 상대방도 당신을 생각하고 있어요. 하지만 타이밍이 중요합니다. 조금만 기다려보세요.",
    "이 카드는 변화의 시기를 나타내요. 두려워하지 말고 새로운 시작을 받아들이세요.",
    "카드가 말합니다: 지금 당신이 느끼는 것이 맞습니다. 직관을 믿고 앞으로 나아가세요.",
    "이 카드는 풍요의 에너지를 담고 있어요. 지출을 줄이고 저축에 집중하면 복이 쌓입니다.",
    "카드가 말합니다: 급할수록 돌아가세요. 천천히 하지만 확실하게 나아가면 반드시 도달합니다."
  ];
  var ans=answers[Math.floor(Math.random()*answers.length)];
  var res=document.getElementById("askResult");
  res.textContent="🔮 카드의 메시지\n\n"+ans+"\n\n✨ 카드는 방향을 보여줄 뿐, 선택은 당신의 몫이에요.";
  res.classList.add("show");
  document.getElementById("q").value="";
  res.scrollIntoView({behavior:"smooth"});
}
</script>
