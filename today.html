<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>오늘의 운세 - 깨비아씨</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{
      font-family:'Noto Sans KR',sans-serif;color:#fff5e0;min-height:100vh;
      background:radial-gradient(ellipse 120% 50% at 50% 0%,rgba(100,30,200,0.9) 0%,transparent 55%),
        radial-gradient(ellipse 80% 40% at 20% 30%,rgba(80,10,160,0.5) 0%,transparent 50%),
        linear-gradient(180deg,#1e0040 0%,#140030 20%,#0c001e 45%,#060012 70%,#02000a 100%);
    }
    .app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:110px;}

    /* 상단 헤더 */
    .header{
      display:flex;align-items:center;gap:12px;
      padding:16px 18px;
      border-bottom:1px solid rgba(212,168,64,0.2);
    }
    .back-btn{
      width:38px;height:38px;border-radius:50%;
      border:1.5px solid rgba(212,168,64,0.4);
      background:rgba(20,0,45,0.6);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;cursor:pointer;flex-shrink:0;
    }
    .header-title{
      font-family:'Noto Serif KR',serif;
      font-size:20px;font-weight:900;
      background:linear-gradient(160deg,#ffe8a0,#f0c84a,#c89830);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* 캐릭터 배너 */
    .char-banner{
      display:flex;align-items:center;gap:14px;
      padding:16px 18px;
      background:rgba(255,255,255,0.04);
      border-bottom:1px solid rgba(212,168,64,0.15);
    }
    .char-banner img{width:70px;height:70px;object-fit:cover;border-radius:12px;border:1.5px solid rgba(212,168,64,0.4);}
    .char-banner-text{}
    .char-banner-text strong{display:block;font-size:15px;font-weight:900;color:#f0c84a;margin-bottom:4px;}
    .char-banner-text span{font-size:12px;color:rgba(195,165,235,0.85);line-height:1.5;}

    /* 오늘의 운세 결과 카드 */
    .result-card{
      margin:16px 16px 0;
      background:rgba(14,3,32,0.92);
      border:1.5px solid rgba(212,168,64,0.4);
      border-radius:18px;padding:18px;
      position:relative;overflow:hidden;
    }
    .result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#d4a840,transparent)}
    .result-title{
      font-size:13px;color:rgba(195,165,235,0.85);
      font-weight:700;margin-bottom:12px;
      display:flex;align-items:center;gap:6px;
    }
    .result-content{font-size:14px;line-height:1.9;color:#fff5e0;white-space:pre-line;}
    .result-content.loading{color:rgba(195,165,235,0.6);font-style:italic;}

    /* 운세 바 */
    .fortune-bars{margin:10px 16px 0;background:rgba(14,3,32,0.92);border:1.5px solid rgba(212,168,64,0.35);border-radius:12px;padding:8px 11px;position:relative;}
    .fortune-bars::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#d4a840,transparent)}
    .fb-title{font-size:10px;color:rgba(195,165,235,0.85);font-weight:700;margin-bottom:5px;}
    .fb-stars{font-size:13px;letter-spacing:1px;margin-bottom:5px;}
    .bars{display:flex;flex-direction:column;gap:4px;}
    .brow{display:flex;align-items:center;gap:7px;}
    .blabel{font-size:10.5px;font-weight:700;width:46px;flex-shrink:0;white-space:nowrap;}
    .btrack{flex:1;height:5px;background:rgba(255,255,255,0.09);border-radius:3px;overflow:hidden;}
    .bfill{height:100%;border-radius:3px;transition:width 1.4s cubic-bezier(.22,1,.36,1);}
    .bfill.love{background:linear-gradient(90deg,#ff9dbd,#ff3ca6)}
    .bfill.money{background:linear-gradient(90deg,#f5d060,#e8a800)}
    .bfill.work{background:linear-gradient(90deg,#80b8ff,#2060ff)}
    .bfill.health{background:linear-gradient(90deg,#70e890,#10aa40)}
    .bpct{font-size:10.5px;font-weight:900;color:#f0c84a;width:28px;text-align:right;flex-shrink:0;}

    /* 질문 입력 */
    .ask-section{margin:16px 16px 0;}
    .ask-label{font-size:12.5px;color:rgba(195,165,235,0.85);font-weight:700;margin-bottom:8px;}
    .ask-row{display:grid;grid-template-columns:1fr auto;gap:8px;}
    .inp{
      padding:13px 14px;border-radius:14px;font-size:14px;
      border:1.5px solid rgba(212,168,64,0.3);
      background:rgba(18,3,38,0.85);color:#fff5e0;
      outline:none;font-family:'Noto Sans KR',sans-serif;
      transition:border-color .2s;
    }
    .inp::placeholder{color:rgba(180,150,220,0.5)}
    .inp:focus{border-color:#f0c84a;}
    .ask-btn{
      padding:13px 16px;border-radius:14px;font-size:14px;font-weight:900;
      border:none;cursor:pointer;
      background:linear-gradient(135deg,#6030c0,#c03080);
      color:#fff;font-family:'Noto Sans KR',sans-serif;
      white-space:nowrap;
      box-shadow:0 4px 14px rgba(100,20,180,0.5);
      transition:all .2s;
    }
    .ask-btn:hover{opacity:.88;transform:translateY(-1px)}
    .ask-btn:active{transform:scale(0.96)}

    /* 띠별 운세 버튼 */
    .zodiac-btn-wrap{
      margin:12px 16px 0;
      background:rgba(14,3,32,0.92);
      border:1.5px solid rgba(212,168,64,0.35);
      border-radius:16px;padding:14px 16px;
      display:flex;align-items:center;justify-content:space-between;
      cursor:pointer;transition:all .2s;
    }
    .zodiac-btn-wrap:hover{border-color:#f0c84a;background:rgba(30,8,60,0.95);}
    .zodiac-btn-left{display:flex;align-items:center;gap:10px;}
    .zodiac-btn-left span{font-size:28px;}
    .zodiac-btn-text strong{display:block;font-size:14px;font-weight:900;color:#f0c84a;}
    .zodiac-btn-text small{font-size:11px;color:rgba(195,165,235,0.8);}
    .zodiac-btn-arr{
      width:28px;height:28px;border-radius:50%;
      background:linear-gradient(135deg,#6030c0,#c03080);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:900;
    }

    /* 하단 네비 */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;background:rgba(6,0,16,0.97);border-top:1.5px solid rgba(212,168,64,0.35);display:flex;justify-content:space-around;align-items:center;padding:14px 0 24px;backdrop-filter:blur(20px);}
    .nitem{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;padding:2px 0;transition:all .2s;}
    .nicon{font-size:30px;display:block;}
    .nlabel{font-size:13px;font-weight:700;color:rgba(195,165,235,0.8);}
    .nitem.active .nlabel{color:#f0c84a;}
    .nitem.active .nicon{filter:drop-shadow(0 0 6px rgba(240,200,74,0.8));}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fadein{animation:fadeUp .35s ease forwards;}

</head>

const colors=['보라색','금색','붉은색','초록색','파란색','하늘색','분홍색','주황색','흰색','노란색'];

function rnd(arr, seed){ return arr[seed % arr.length]; }

function loadToday(){
  // 날짜 기반 시드 + 랜덤 조합으로 매 접속마다 다르게
  const now = new Date();
  const dateSeed = now.getFullYear()*10000 + (now.getMonth()+1)*100 + now.getDate();
  const s = dateSeed + Math.floor(Math.random()*9999);

  const result = document.getElementById('result');
  result.classList.remove('loading');
  result.classList.add('fadein');
  result.textContent =
    '총운: ' + rnd(daily, s) + '\n\n' +
    '사랑운: ' + rnd(loveList, s+1) + '\n' +
    '금전운: ' + rnd(moneyList, s+2) + '\n' +
    '직장운: ' + rnd(workList, s+3) + '\n' +
    '건강운: ' + rnd(healthList, s+4) + '\n\n' +
    '행운 숫자: ' + ((s%9)+1) + '\n' +
    '행운 색상: ' + rnd(colors, s+5);

  setTimeout(()=>{
    const v={
      love: 55 + (s % 40),
      money: 50 + ((s*3) % 45),
      work: 55 + ((s*7) % 40),
      health: 50 + ((s*5) % 45)
    };
    ['love','money','work','health'].forEach(k=>{
      document.getElementById('b-'+k).style.width=v[k]+'%';
      document.getElementById('p-'+k).textContent=v[k]+'%';
    });

    // 별점도 랜덤 (3~5)
    const stars = 3 + (s % 3);
    const starEl = document.querySelector('.fb-stars');
    if(starEl) starEl.innerHTML = '⭐'.repeat(stars) + '<span style="opacity:.3">' + '⭐'.repeat(5-stars) + '</span>';
  },400);
}

function ask(){
  const q=document.getElementById('q').value.trim();
  if(!q){return;}
  let type='general';
  if(q.includes('연락')||q.includes('사랑')||q.includes('재회')||q.includes('남자')||q.includes('여자'))type='love';
  if(q.includes('돈')||q.includes('금전')||q.includes('재물')||q.includes('투자'))type='money';
  if(q.includes('힘들')||q.includes('고민')||q.includes('불안')||q.includes('걱정'))type='mind';
  const titles={love:'💗 사랑 상담',money:'💰 금전 상담',mind:'🌙 마음 상담',general:'🔮 깨비아씨 상담'};
  const arr=consult[type];
  const ans=arr[Math.floor(Math.random()*arr.length)];
  const result=document.getElementById('result');
  result.classList.add('fadein');
  result.textContent=titles[type]+'\n\n'+ans+'\n\n🍀 깨비 한마디: 급할수록 말은 짧고 마음은 따뜻하게 전해보세요.';
  document.getElementById('q').value='';
}
